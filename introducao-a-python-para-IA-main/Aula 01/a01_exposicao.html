<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — O que é programar? · Aula 01</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#4f46e5;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#4f46e5;transform:scale(1.4)}.dot.done{background:#a5b4fc;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#4f46e5;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #4f46e5}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}
.hl{background:#eef2ff;border-left:3px solid #4f46e5;padding:10px 13px;font-size:12.5px;color:#312e81;line-height:1.55;margin:10px 0}
.hl strong{color:#3730a3;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#4f46e5;color:#fff;border-color:#4f46e5}
.nb.pr:hover{background:#4338ca}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}
.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#a5b4fc;background:#eef2ff}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#eef2ff;color:#4f46e5;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.next-page{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#4f46e5}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#4f46e5;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#4338ca}
.analogia{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:12px 0}
.analogia-lado{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px}
.analogia-seta{font-size:22px;color:#94a3b8;text-align:center}
.analogia-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:5px}
.analogia-val{font-size:13px;font-weight:600;color:#1e293b}
.analogia-sub{font-size:11px;color:#64748b;margin-top:3px;line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 01</span>
      <div><div class="hdr-title">O que é programar? Primeiros passos com Python · Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-wrap" id="slide-wrap"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="goNav(-1)" disabled>← Anterior</button>
    <span class="nc" id="counter">1 / 9</span>
    <button class="nb pr" id="btn-next" onclick="goNav(1)">Próximo →</button>
  </div>
</div>
<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">Programar é dar instruções — como uma receita</div><div class="ssub">Antes de abrir qualquer editor, precisamos entender o que é programação. É mais simples do que parece.</div><div class="analogia"><div class="analogia-lado"><div class="analogia-label">Receita de bolo</div><div class="analogia-val">1. Misture ovos e açúcar</div><div class="analogia-sub">2. Adicione a farinha aos poucos</div><div class="analogia-sub">3. Leve ao forno por 40 min</div></div><div class="analogia-seta">≈</div><div class="analogia-lado"><div class="analogia-label">Programa de computador</div><div class="analogia-val">1. Leia o nome do usuário</div><div class="analogia-sub">2. Calcule o IMC com peso e altura</div><div class="analogia-sub">3. Exiba o resultado na tela</div></div></div><div class="cards"><div class="card ac"><div class="ci">🖥️</div><div class="ct">O computador é obediente</div><div class="cb">Ele faz exatamente o que você escreve — nem mais, nem menos. Nunca adivinha o que você quis dizer.</div></div><div class="card ac"><div class="ci">🐍</div><div class="ct">A linguagem é o Python</div><div class="cb">Python é uma das linguagens mais legíveis do mundo. Parece inglês! Usada por iniciantes e por grandes empresas de tecnologia.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Descreva passo a passo como você prepara um café. Seja específico — eu vou seguir à risca cada instrução."</em></div></div><div class="card"><div class="ci">🎯</div><div class="ct">O que veremos hoje</div><div class="cb">Google Colab, variáveis, tipos de dados, print(), input(), operações e os primeiros erros — que são normais e esperados.</div></div></div>';},
function(){return '<div class="ey">Ambiente · 3 min</div><div class="stitle">Google Colab — nosso caderno de código</div><div class="ssub">Não precisa instalar nada. O Colab funciona no navegador e salva tudo automaticamente no Google Drive.</div><div class="cards"><div class="card ac"><div class="ci">📓</div><div class="ct">O que é um Notebook?</div><div class="cb">Um arquivo dividido em células. Em cada célula você escreve código ou texto. Executa uma célula por vez — perfeito para aprender no ritmo certo.</div></div><div class="card ac"><div class="ci">⌨️</div><div class="ct">Shift + Enter</div><div class="cb">Executa a célula e avança para a próxima. É o atalho mais usado no Colab. Ctrl+Enter executa e permanece na mesma célula.</div></div><div class="card ac"><div class="ci">🟦</div><div class="ct">Dois tipos de célula</div><div class="cb"><strong>Código:</strong> fundo cinza, roda Python.<br><strong>Texto:</strong> para anotações. Use para registrar o que entendeu de cada passo.</div></div><div class="card"><div class="ci">☁️</div><div class="ct">Salva automaticamente</div><div class="cb">Tudo fica no Google Drive. Você pode fechar e abrir em qualquer computador sem perder nada.</div></div></div><div class="hl"><strong>Faça agora:</strong> abra o navegador → <strong>colab.research.google.com</strong> → clique em "Novo notebook" → renomeie para <code>aula01.ipynb</code>. Na primeira célula escreva <code>print("Olá!")</code> e pressione Shift+Enter.</div>';},
function(){return '<div class="ey">Conceito fundamental · 4 min</div><div class="stitle">Variáveis — caixas com nome para guardar valores</div><div class="ssub">Uma variável é como uma caixa com um nome escrito nela. Você coloca um valor dentro e pode usar esse valor a qualquer momento.</div><div class="cw"><div class="ch"><span>Python · Criando as primeiras variáveis</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># O símbolo = significa "guarda o valor"</span>\n<span class="cm"># Não é uma equação de matemática!</span>\n\n<span class="p">nome</span>   = <span class="s">"Maria"</span>   <span class="cm"># caixa "nome" guarda o texto Maria</span>\n<span class="p">idade</span>  = <span class="v">25</span>        <span class="cm"># caixa "idade" guarda o número 25</span>\n<span class="p">altura</span> = <span class="v">1.68</span>      <span class="cm"># caixa "altura" guarda 1.68</span>\n\n<span class="cm"># Para ver o conteúdo de uma variável, use print()</span>\n<span class="fn">print</span>(<span class="p">nome</span>)    <span class="cm"># exibe: Maria</span>\n<span class="fn">print</span>(<span class="p">idade</span>)   <span class="cm"># exibe: 25</span>\n\n<span class="cm"># Você pode atualizar o valor de uma variável</span>\n<span class="p">idade</span> = <span class="v">26</span>     <span class="cm"># agora a caixa "idade" guarda 26</span>\n<span class="fn">print</span>(<span class="p">idade</span>)   <span class="cm"># exibe: 26</span></pre></div><div class="hl"><strong>Regra de nomes:</strong> use letras minúsculas, sem espaços e sem acentos. Para nomes compostos use underline: <code>nome_completo</code>, <code>data_nascimento</code>. Nunca comece com número.</div>';},
function(){return '<div class="ey">Tipos de dados · 4 min</div><div class="stitle">int, float, str, bool — os 4 tipos que você vai usar todo dia</div><div class="ssub">Cada variável guarda um tipo específico. Python descobre o tipo sozinho — você não precisa declarar nada.</div><div class="cw"><div class="ch"><span>Python · Os 4 tipos básicos</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># int — números inteiros (sem vírgula)</span>\n<span class="p">qtd_alunos</span> = <span class="v">32</span>\n<span class="p">ano</span>        = <span class="v">2026</span>\n\n<span class="cm"># float — decimais (usa ponto, não vírgula!)</span>\n<span class="p">peso</span>   = <span class="v">72.5</span>\n<span class="p">altura</span> = <span class="v">1.75</span>\n\n<span class="cm"># str — texto, sempre entre aspas</span>\n<span class="p">nome</span>   = <span class="s">"João"</span>\n<span class="p">cidade</span> = <span class="s">"São Paulo"</span>\n\n<span class="cm"># bool — apenas dois valores possíveis</span>\n<span class="p">aprovado</span>  = <span class="v">True</span>\n<span class="p">reprovado</span> = <span class="v">False</span>\n\n<span class="cm"># Descobrir o tipo de uma variável</span>\n<span class="fn">print</span>(<span class="fn">type</span>(<span class="p">qtd_alunos</span>))  <span class="cm"># &lt;class "int"&gt;</span>\n<span class="fn">print</span>(<span class="fn">type</span>(<span class="p">nome</span>))        <span class="cm"># &lt;class "str"&gt;</span></pre></div><div class="compare"><div class="cs"><div class="csh" style="background:#fef2f2;color:#991b1b">❌ Erro comum</div><div class="csb"><code>peso = "72.5"</code><br><br>Isso guarda o <strong>texto</strong> "72.5", não o número. Você não consegue fazer cálculos com ele.<br><br>Correto: <code>peso = 72.5</code></div></div><div class="cs"><div class="csh" style="background:#f0fdf4;color:#15803d">✅ Correto</div><div class="csb">Use aspas <strong>só</strong> para texto de verdade. Números ficam sem aspas.<br><br><code>idade = 20</code> → número ✓<br><code>nome = "Ana"</code> → texto ✓<br><code>ativo = True</code> → bool ✓</div></div></div>';},
function(){return '<div class="ey">Saída e entrada · 4 min</div><div class="stitle">print() e input() — o programa fala e ouve</div><div class="ssub"><code>print()</code> exibe informação na tela. <code>input()</code> pausa e espera o usuário digitar. São os dois comandos mais usados no início.</div><div class="cw"><div class="ch"><span>Python · print() e input() na prática</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># print() exibe qualquer valor na tela</span>\n<span class="fn">print</span>(<span class="s">"Olá, mundo!"</span>)\n<span class="fn">print</span>(<span class="v">42</span>)\n<span class="fn">print</span>(<span class="p">nome</span>)    <span class="cm"># exibe o conteúdo da variável</span>\n\n<span class="cm"># f-string: texto com variáveis embutidas</span>\n<span class="p">nome</span>  = <span class="s">"Ana"</span>\n<span class="p">idade</span> = <span class="v">20</span>\n<span class="fn">print</span>(<span class="s">f"Meu nome é {nome} e tenho {idade} anos."</span>)\n<span class="cm"># → Meu nome é Ana e tenho 20 anos.</span>\n\n<span class="cm"># input() lê o que o usuário digitar</span>\n<span class="p">nome</span> = <span class="fn">input</span>(<span class="s">"Qual é o seu nome? "</span>)\n<span class="fn">print</span>(<span class="s">f"Olá, {nome}! Bem-vindo ao Python."</span>)\n\n<span class="cm"># ATENÇÃO: input() SEMPRE retorna texto (str)!</span>\n<span class="p">idade</span> = <span class="fn">int</span>(<span class="fn">input</span>(<span class="s">"Sua idade: "</span>))</pre></div><div class="hl"><strong>f-string:</strong> coloque a letra <code>f</code> antes das aspas e use <code>{variavel}</code> dentro do texto. É a forma mais legível de montar mensagens em Python e você verá em todo projeto real.</div>';},
function(){return '<div class="ey">Cálculos · 3 min</div><div class="stitle">Operações aritméticas — Python como calculadora</div><div class="ssub">Python faz cálculos com os mesmos símbolos de matemática, mais alguns extras muito úteis.</div><div class="cw"><div class="ch"><span>Python · Operadores aritméticos</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="fn">print</span>(<span class="v">10</span> + <span class="v">3</span>)    <span class="cm"># 13   → soma</span>\n<span class="fn">print</span>(<span class="v">10</span> - <span class="v">3</span>)    <span class="cm"># 7    → subtração</span>\n<span class="fn">print</span>(<span class="v">10</span> * <span class="v">3</span>)    <span class="cm"># 30   → multiplicação</span>\n<span class="fn">print</span>(<span class="v">10</span> / <span class="v">3</span>)    <span class="cm"># 3.33 → divisão (sempre float)</span>\n<span class="fn">print</span>(<span class="v">10</span> // <span class="v">3</span>)   <span class="cm"># 3    → divisão inteira</span>\n<span class="fn">print</span>(<span class="v">10</span> % <span class="v">3</span>)    <span class="cm"># 1    → resto da divisão</span>\n<span class="fn">print</span>(<span class="v">10</span> ** <span class="v">2</span>)   <span class="cm"># 100  → potência (10²)</span>\n\n<span class="cm"># Exemplo prático: calculadora de IMC</span>\n<span class="p">peso</span>   = <span class="fn">float</span>(<span class="fn">input</span>(<span class="s">"Peso (kg): "</span>))\n<span class="p">altura</span> = <span class="fn">float</span>(<span class="fn">input</span>(<span class="s">"Altura (m): "</span>))\n<span class="p">imc</span>    = <span class="p">peso</span> / <span class="p">altura</span> ** <span class="v">2</span>\n<span class="fn">print</span>(<span class="s">f"Seu IMC é: {imc:.1f}"</span>)</pre></div><div class="hl"><strong>Ordem das operações:</strong> Python segue a mesma precedência da matemática — potência primeiro, depois * e /, depois + e -. Use parênteses para forçar a ordem: <code>(2 + 3) * 4</code> = 20.</div>';},
function(){return '<div class="ey">Erros · 3 min</div><div class="stitle">Mensagens de erro — aprender a ler é uma habilidade</div><div class="ssub">Todo programador vê erros o tempo todo. A habilidade importante não é nunca errar — é saber interpretar a mensagem e corrigir.</div><div class="cards"><div class="card ac"><div class="ci">🔴</div><div class="ct">SyntaxError</div><div class="cb">Erro de escrita — como erro de ortografia. Exemplo: esquecer os parênteses do <code>print</code> ou não fechar as aspas de uma string.</div></div><div class="card ac"><div class="ci">🟠</div><div class="ct">NameError</div><div class="cb">Você usou um nome que não existe. Geralmente erro de digitação. Exemplo: <code>prnit</code> em vez de <code>print</code>.</div></div><div class="card ac"><div class="ci">🟡</div><div class="ct">TypeError</div><div class="cb">Você misturou tipos incompatíveis. Exemplo: somar número com texto sem converter com <code>int()</code>.</div></div><div class="card"><div class="ci">💡</div><div class="ct">Como ler o erro</div><div class="cb">Leia a <strong>última linha</strong>: diz o tipo. A linha com seta mostra <strong>onde</strong> aconteceu. Comece por lá.</div></div></div><div class="cw"><div class="ch"><span>Python · O erro mais comum no início</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># input() retorna SEMPRE string — cuidado!</span>\n<span class="p">idade</span> = <span class="fn">input</span>(<span class="s">"Sua idade: "</span>)\n<span class="fn">print</span>(<span class="p">idade</span> + <span class="v">1</span>)   <span class="cm"># ❌ TypeError!</span>\n\n<span class="cm"># Solução: converter para int</span>\n<span class="p">idade</span> = <span class="fn">int</span>(<span class="fn">input</span>(<span class="s">"Sua idade: "</span>))\n<span class="fn">print</span>(<span class="p">idade</span> + <span class="v">1</span>)   <span class="cm"># ✅ funciona!</span></pre></div>';},
function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. O que a função <code>input()</code> sempre retorna, independente do que o usuário digitar?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>Um número inteiro (int)</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>B</span>Um número decimal (float)</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>C</span>Sempre um texto (str)</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span>Verdadeiro ou falso (bool)</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! input() sempre retorna string, mesmo que o usuário digite "42". Por isso usamos int() ou float() para converter quando queremos fazer contas.</div></div><div class="qb"><div class="qa">2. Como guardar corretamente o número 8 em uma variável chamada <code>qtd</code>?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>A</span><code>qtd = "8"</code></div><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>B</span><code>qtd = 8</code></div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>C</span><code>8 = qtd</code></div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span><code>var qtd = 8</code></div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! Variável à esquerda, valor à direita do =. Sem aspas para números e sem a palavra "var" — isso é JavaScript.</div></div>';},

function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=30*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Não exatamente — relembre o que vimos sobre tipos e funções.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
