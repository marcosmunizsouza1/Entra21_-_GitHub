<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#1e40af;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#1e40af;transform:scale(1.4)}.dot.done{background:#93c5fd;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}

@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#1e40af;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #1e40af}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}
.hl{background:#eff6ff;border-left:3px solid #1e40af;padding:10px 13px;font-size:12.5px;color:#1e3a5f;line-height:1.55;margin:10px 0}
.hl strong{color:#1e40af;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#1e40af;color:#fff;border-color:#1e40af}
.nb.pr:hover{background:#1e3a8a}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}
.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#93c5fd;background:#eff6ff}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#dbeafe;color:#1e40af;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.next-page{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#1e40af}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#1e40af;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#1e3a8a}
.bench{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0}
.bench-lado{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.bench-titulo{padding:7px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.bench-corpo{padding:10px 12px;font-family:'Courier New',monospace;font-size:12px;color:#64748b;line-height:1.7}
.bench-tempo{font-size:18px;font-weight:700;padding:4px 0}
</style>

<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">NumPy — o motor matemático por trás da IA</div><div class="ssub">Python é lento para calcular com grandes volumes de números. NumPy resolve isso com arrays otimizados — a base de Pandas, TensorFlow e Scikit-learn.</div><div class="cards"><div class="card ac"><div class="ci">⚡</div><div class="ct">100x mais rápido</div><div class="cb">NumPy usa código C por baixo dos panos. Para somar dois vetores de 1 milhão de elementos: lista Python leva ~200ms, NumPy leva ~1ms.</div></div><div class="card ac"><div class="ci">🔢</div><div class="ct">ndarray — o tipo central</div><div class="cb">Arrays N-dimensionais com todos os elementos do mesmo tipo. Ocupa memória contígua — muito mais eficiente que listas Python.</div></div><div class="card ac"><div class="ci">🔗</div><div class="ct">Base de tudo</div><div class="cb">Pandas usa NumPy por baixo. Scikit-learn usa NumPy. TensorFlow tem seu próprio Tensor — o mesmo conceito. Aprender NumPy é aprender a fundação.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Se precisassem somar dois vetores de 1000 números cada, quantas linhas de código usariam com for? E com NumPy, como seria?"</em></div></div></div>';},
function(){return '<div class="ey">Conceito central · 3 min</div><div class="stitle">Lista Python vs Array NumPy</div><div class="ssub">A diferença fundamental nao é a sintaxe — é o que acontece na memória e na CPU.</div><div class="compare"><div class="cs"><div class="csh" style="background:#fef2f2;color:#991b1b">🐌 Lista Python</div><div class="csb">• Cada elemento é um objeto separado<br>• Espalhados na memória — cache miss<br>• Tipos mistos: cada elemento tem overhead<br>• Operações precisam de loop explícito<br><br><code>soma = []</code><br><code>for i in range(len(a)):</code><br><code>&nbsp;&nbsp;&nbsp;&nbsp;soma.append(a[i]+b[i])</code></div></div><div class="cs"><div class="csh" style="background:#eff6ff;color:#1e3a8a">⚡ Array NumPy</div><div class="csb">• Bloco único de memória contígua<br>• Cache-friendly — muito mais rápido<br>• Tipo homogêneo: sem overhead por elemento<br>• Operações vetorizadas: sem loop no Python<br><br><code>import numpy as np</code><br><code>soma = a + b &nbsp;&nbsp;# isso é tudo!</code></div></div></div><div class="hl"><strong>Vetorização:</strong> a operação se aplica a todos os elementos de uma vez, em código C compilado, sem passar pelo interpretador Python. É o segredo da performance.</div>';},
function(){return '<div class="ey">Criando arrays · 4 min</div><div class="stitle">Formas de criar arrays NumPy</div><div class="ssub">Há várias formas de criar arrays. Cada uma tem seu uso — aprenda as mais comuns e quando usar cada uma.</div><div class="cw"><div class="ch"><span>Python · Criando arrays NumPy</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">import</span> <span class="p">numpy</span> <span class="k">as</span> <span class="p">np</span>\n\n<span class="cm"># A partir de uma lista Python</span>\n<span class="p">v</span> = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">1.0</span>, <span class="v">2.0</span>, <span class="v">3.0</span>, <span class="v">4.0</span>])\n\n<span class="cm"># Arrays especiais</span>\n<span class="p">np</span>.<span class="fn">zeros</span>(<span class="v">5</span>)          <span class="cm"># [0. 0. 0. 0. 0.]</span>\n<span class="p">np</span>.<span class="fn">ones</span>((<span class="v">2</span>, <span class="v">3</span>))      <span class="cm"># matriz 2x3 de uns</span>\n<span class="p">np</span>.<span class="fn">arange</span>(<span class="v">0</span>, <span class="v">10</span>, <span class="v">2</span>) <span class="cm"># [0 2 4 6 8]</span>\n<span class="p">np</span>.<span class="fn">linspace</span>(<span class="v">0</span>, <span class="v">1</span>, <span class="v">5</span>)<span class="cm"># [0.  0.25 0.5  0.75 1.]</span>\n\n<span class="cm"># Arrays aleatórios — muito usados em ML</span>\n<span class="p">np</span>.<span class="fn">random</span>.<span class="fn">seed</span>(<span class="v">42</span>)           <span class="cm"># reprodutibilidade!</span>\n<span class="p">np</span>.<span class="fn">random</span>.<span class="fn">rand</span>(<span class="v">4</span>)            <span class="cm"># 4 floats entre 0 e 1</span>\n<span class="p">np</span>.<span class="fn">random</span>.<span class="fn">randint</span>(<span class="v">0</span>, <span class="v">10</span>, <span class="v">5</span>) <span class="cm"># 5 inteiros de 0 a 9</span></pre></div><div class="hl"><strong>np.linspace(a, b, n)</strong> cria n pontos igualmente espaçados entre a e b — diferente de arange que usa passo fixo. Muito útil para gráficos e simulações.</div>';},
function(){return '<div class="ey">Shape e dtype · 3 min</div><div class="stitle">shape e dtype — a identidade do array</div><div class="ssub">Dois atributos definem completamente um array: <code>shape</code> (suas dimensões) e <code>dtype</code> (o tipo dos elementos). Entendê-los evita 90% dos erros em ML.</div><div class="cw"><div class="ch"><span>Python · shape e dtype</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">v</span>  = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">1</span>, <span class="v">2</span>, <span class="v">3</span>, <span class="v">4</span>])\n<span class="p">m</span>  = <span class="p">np</span>.<span class="fn">array</span>([[<span class="v">1</span>,<span class="v">2</span>,<span class="v">3</span>],[<span class="v">4</span>,<span class="v">5</span>,<span class="v">6</span>]])\n\n<span class="fn">print</span>(<span class="p">v</span>.<span class="fn">shape</span>)    <span class="cm"># (4,)   → vetor de 4</span>\n<span class="fn">print</span>(<span class="p">m</span>.<span class="fn">shape</span>)    <span class="cm"># (2, 3) → 2 linhas, 3 colunas</span>\n<span class="fn">print</span>(<span class="p">v</span>.<span class="fn">dtype</span>)    <span class="cm"># int64</span>\n<span class="fn">print</span>(<span class="p">v</span>.<span class="fn">ndim</span>)     <span class="cm"># 1 — número de dimensões</span>\n<span class="fn">print</span>(<span class="p">m</span>.<span class="fn">size</span>)     <span class="cm"># 6 — total de elementos</span>\n\n<span class="cm"># Forçar tipo</span>\n<span class="p">f</span> = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">1</span>, <span class="v">2</span>, <span class="v">3</span>], <span class="p">dtype</span>=<span class="fn">float</span>)\n<span class="fn">print</span>(<span class="p">f</span>.<span class="fn">dtype</span>)    <span class="cm"># float64</span></pre></div><div class="hl"><strong>Por que dtype importa:</strong> int32 ocupa metade da memória de int64. float32 é o padrão em redes neurais. Passar o dtype errado para um modelo causa erros silenciosos.</div>';},
function(){return '<div class="ey">Operações vetorizadas · 4 min</div><div class="stitle">Vetorização — operações sem loop</div><div class="ssub">Com NumPy, operadores aritméticos se aplicam a todos os elementos de uma vez. Nenhum for necessário. Mais rápido e mais legível.</div><div class="cw"><div class="ch"><span>Python · Operações elemento a elemento</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">a</span> = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">1</span>, <span class="v">2</span>, <span class="v">3</span>, <span class="v">4</span>, <span class="v">5</span>])\n<span class="p">b</span> = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">10</span>, <span class="v">20</span>, <span class="v">30</span>, <span class="v">40</span>, <span class="v">50</span>])\n\n<span class="fn">print</span>(<span class="p">a</span> + <span class="p">b</span>)   <span class="cm"># [11 22 33 44 55]</span>\n<span class="fn">print</span>(<span class="p">a</span> * <span class="v">2</span>)   <span class="cm"># [ 2  4  6  8 10]</span>\n<span class="fn">print</span>(<span class="p">a</span> ** <span class="v">2</span>)  <span class="cm"># [ 1  4  9 16 25]</span>\n<span class="fn">print</span>(<span class="p">a</span> > <span class="v">3</span>)   <span class="cm"># [F F F T T]  → booleano!</span>\n\n<span class="cm"># Funções matemáticas universais (ufuncs)</span>\n<span class="p">np</span>.<span class="fn">sqrt</span>(<span class="p">a</span>)     <span class="cm"># raiz de cada elemento</span>\n<span class="p">np</span>.<span class="fn">exp</span>(<span class="p">a</span>)      <span class="cm"># e^x de cada elemento</span>\n<span class="p">np</span>.<span class="fn">log</span>(<span class="p">a</span>)      <span class="cm"># ln(x) de cada elemento</span>\n\n<span class="cm"># Normalização min-max — padrão em ML</span>\n<span class="p">norm</span> = (<span class="p">a</span> - <span class="p">a</span>.<span class="fn">min</span>()) / (<span class="p">a</span>.<span class="fn">max</span>() - <span class="p">a</span>.<span class="fn">min</span>())\n<span class="cm"># [0.  0.25 0.5  0.75 1.]</span></pre></div>';},
function(){return '<div class="ey">Estatísticas · 3 min</div><div class="stitle">Funções estatísticas — uma linha para tudo</div><div class="ssub">NumPy traz as operações estatísticas mais usadas como métodos do array. O que em Python puro levaria um loop, aqui é uma chamada.</div><div class="cw"><div class="ch"><span>Python · Estatísticas com NumPy</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">notas</span> = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">7.5</span>, <span class="v">8.0</span>, <span class="v">6.5</span>, <span class="v">9.0</span>, <span class="v">5.5</span>, <span class="v">8.5</span>])\n\n<span class="fn">print</span>(<span class="p">notas</span>.<span class="fn">mean</span>())   <span class="cm"># média</span>\n<span class="fn">print</span>(<span class="p">notas</span>.<span class="fn">std</span>())    <span class="cm"># desvio padrão</span>\n<span class="fn">print</span>(<span class="p">notas</span>.<span class="fn">min</span>())    <span class="cm"># mínimo</span>\n<span class="fn">print</span>(<span class="p">notas</span>.<span class="fn">max</span>())    <span class="cm"># máximo</span>\n<span class="fn">print</span>(<span class="p">notas</span>.<span class="fn">sum</span>())    <span class="cm"># soma total</span>\n<span class="fn">print</span>(<span class="p">np</span>.<span class="fn">median</span>(<span class="p">notas</span>)) <span class="cm"># mediana</span>\n\n<span class="cm"># argmin/argmax retornam o ÍNDICE, nao o valor</span>\n<span class="fn">print</span>(<span class="p">np</span>.<span class="fn">argmax</span>(<span class="p">notas</span>))  <span class="cm"># 3 (índice da nota 9.0)</span>\n<span class="fn">print</span>(<span class="p">np</span>.<span class="fn">argmin</span>(<span class="p">notas</span>))  <span class="cm"># 4 (índice da nota 5.5)</span></pre></div><div class="hl"><strong>argmax e argmin</strong> são muito usados em ML. Quando um modelo classifica imagens, a resposta é um array de probabilidades — argmax retorna o índice da classe com maior probabilidade.</div>';},
function(){return '<div class="ey">Indexação · 3 min</div><div class="stitle">Indexação e seleção booleana</div><div class="ssub">Selecionar dados é 80% do trabalho em ciência de dados. NumPy tem indexação muito mais poderosa que listas — incluindo seleção por condição lógica.</div><div class="cw"><div class="ch"><span>Python · Indexação avançada</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">arr</span> = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">10</span>, <span class="v">20</span>, <span class="v">30</span>, <span class="v">40</span>, <span class="v">50</span>])\n\n<span class="cm"># Indexação básica — igual à lista</span>\n<span class="fn">print</span>(<span class="p">arr</span>[<span class="v">2</span>])       <span class="cm"># 30</span>\n<span class="fn">print</span>(<span class="p">arr</span>[<span class="v">1</span>:<span class="v">4</span>])     <span class="cm"># [20 30 40]</span>\n<span class="fn">print</span>(<span class="p">arr</span>[::-<span class="v">1</span>])    <span class="cm"># [50 40 30 20 10]</span>\n\n<span class="cm"># Indexação booleana — o superpoder do NumPy</span>\n<span class="p">notas</span> = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">4.5</span>, <span class="v">7.8</span>, <span class="v">3.2</span>, <span class="v">9.1</span>, <span class="v">6.0</span>])\n<span class="p">aprovados</span> = <span class="p">notas</span>[<span class="p">notas</span> >= <span class="v">5.0</span>]\n<span class="fn">print</span>(<span class="p">aprovados</span>)    <span class="cm"># [7.8 9.1 6.0]</span>\n\n<span class="cm"># Contar aprovados</span>\n<span class="fn">print</span>((notas >= <span class="v">5.0</span>).<span class="fn">sum</span>())   <span class="cm"># 3</span></pre></div>';},
function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. Qual é o resultado de <code>np.array([1,2,3]) * 2</code>?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>[1,2,3,1,2,3] — duplica a lista</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>B</span>[2, 4, 6] — multiplica cada elemento</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>C</span>Erro — nao pode multiplicar array por inteiro</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span>6 — soma todos e multiplica</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! NumPy aplica a operação elemento a elemento. array * 2 multiplica cada elemento por 2. Com lista Python, * 2 duplicaria a lista — comportamento completamente diferente!</div></div><div class="qb"><div class="qa">2. O que <code>np.argmax([3, 9, 2, 7])</code> retorna?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>A</span>9 — o maior valor</div><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>B</span>1 — o índice do maior valor</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>C</span>4 — o tamanho do array</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span>True — confirma que o máximo existe</div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! argmax retorna o ÍNDICE do maior valor, nao o valor em si. O maior é 9, que está na posição 1. Em ML, isso é usado para identificar a classe prevista pelo modelo.</div></div>';},
function(){return '<div class="ey">Encerramento · 1 min</div><div class="stitle">Recapitulando</div><div class="ssub">O que aprendemos e o que faremos agora.</div><div class="rl"><div class="ri"><div class="rn">1</div><div class="rt"><strong>NumPy é a base da IA em Python.</strong> 100x mais rápido que listas para operações numéricas, por usar C por baixo e memória contígua.</div></div><div class="ri"><div class="rn">2</div><div class="rt"><strong>shape e dtype identificam o array.</strong> shape mostra as dimensões, dtype o tipo dos elementos. Erros nesses dois causam a maioria dos bugs em ML.</div></div><div class="ri"><div class="rn">3</div><div class="rt"><strong>Vetorização elimina loops.</strong> <code>a + b</code> soma dois arrays elemento a elemento — sem for, mais rápido e mais legível.</div></div><div class="ri"><div class="rn">4</div><div class="rt"><strong>Estatísticas em uma linha:</strong> .mean(), .std(), .min(), .max(), argmax(). Fundação de toda análise exploratória.</div></div><div class="ri"><div class="rn">5</div><div class="rt"><strong>Indexação booleana filtra sem loop:</strong> <code>arr[arr &gt; 5]</code> retorna só os elementos maiores que 5 — padrão usado em todo projeto de dados.</div></div></div><div class="next-page"><div><div class="next-page-label">Próxima etapa</div><div class="next-page-title">▶ Demo ao Vivo — Introdução ao NumPy</div></div><a class="next-page-btn" href="a06_demo_ao_vivo.html">Abrir Demo →</a></div>';}
];
function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=30*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Nao exatamente — reveja vetorização e argmax.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
