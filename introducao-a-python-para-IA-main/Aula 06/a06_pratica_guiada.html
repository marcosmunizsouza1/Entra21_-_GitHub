<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prática Guiada — Introdução ao NumPy · Aula 06</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#eff6ff;min-height:100vh;padding:22px}
.wrap{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:11px}
.pg-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pg-title{font-size:17px;font-weight:600}.pg-meta{font-size:12px;color:#64748b;margin-top:2px}
.pg-time{font-size:12px;font-weight:600;background:#dbeafe;border:1px solid #bfdbfe;padding:4px 12px;border-radius:8px;color:#1e40af}
.prog-row{display:flex;align-items:center;gap:9px}
.pb{flex:1;height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pf{height:100%;background:#1e40af;border-radius:4px;transition:width .4s ease;width:0%}
.pt{font-size:12px;font-weight:600;color:#64748b;min-width:60px;text-align:right}
.sc{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff;transition:border-color .2s}
.sc.done-c{border-color:#86efac}.sc.open-c{border-color:#93c5fd}
.sh{display:flex;align-items:flex-start;gap:11px;padding:12px 13px;cursor:pointer;user-select:none;transition:background .15s}
.sh:hover{background:#f8fafc}.sc.open-c .sh{background:#eff6ff}
.chk{width:21px;height:21px;border-radius:6px;border:1.5px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .18s;cursor:pointer;background:#fff}
.chk:hover{border-color:#1e40af;background:#dbeafe}.chk.done{background:#22c55e;border-color:#22c55e}
.chk svg{display:none}.chk.done svg{display:block}
.si{flex:1}.sn2{font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.st{font-size:13px;font-weight:600;color:#1e293b;line-height:1.3}.stm{font-size:11px;color:#94a3b8;margin-top:2px}
.cv{color:#94a3b8;font-size:11px;margin-top:4px;transition:transform .22s;flex-shrink:0}
.sc.open-c .cv{transform:rotate(180deg)}
.sb{max-height:0;overflow:hidden;transition:max-height .35s ease}
.sc.open-c .sb{max-height:1800px}
.sbi{padding:0 13px 14px;border-top:1px solid #f1f5f9}
.il{display:flex;flex-direction:column;gap:6px;margin:11px 0}
.ii{display:flex;gap:9px;font-size:13px;color:#475569;line-height:1.55;align-items:flex-start}
.in{width:19px;height:19px;min-width:19px;border-radius:5px;background:#dbeafe;color:#1e40af;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cb2{background:#1e293b;border-radius:8px;padding:12px 15px;font-family:'Courier New',monospace;font-size:12px;line-height:1.8;color:#94a3b8;margin:9px 0;overflow-x:auto;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.c{color:#475569;font-style:italic}.fn{color:#fbbf24}
.tip{background:#eff6ff;border-left:3px solid #1e40af;padding:8px 12px;font-size:12px;color:#1e3a5f;line-height:1.5;margin-top:8px}
.tip strong{color:#1e40af;font-weight:600}
.mb{display:inline-flex;align-items:center;gap:5px;background:#f8fafc;border:1px solid #cbd5e1;color:#64748b;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;margin-top:10px}
.mb:hover{background:#f0fdf4;color:#15803d;border-color:#86efac}
.mb.done-btn{background:#f0fdf4;color:#15803d;border-color:#86efac;pointer-events:none}
.sbox{background:#eff6ff;border:1px solid #93c5fd;border-radius:14px;padding:20px;text-align:center;display:none}
.sbox.show{display:block}
.sbox h3{font-size:16px;font-weight:600;color:#1e40af;margin-bottom:6px}
.sbox p{font-size:13px;color:#1e3a8a;line-height:1.6}
.next-page{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;margin-top:4px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#1e40af}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#1e40af;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#1e3a8a}
</style>
</head>
<body>
<div class="wrap">
  <div class="pg-header">
    <div><div class="pg-title">Prática guiada — Introdução ao NumPy</div><div class="pg-meta">Siga os passos no Colab. Marque cada um quando terminar.</div></div>
    <span class="pg-time">60 min disponíveis</span>
  </div>
  <div class="prog-row"><div class="pb"><div class="pf" id="pf"></div></div><div class="pt" id="pt">0 / 6</div></div>
  <div id="steps"></div>
  <div class="sbox" id="sbox">
    <h3>🔢 NumPy dominado!</h3>
    <p>Arrays, vetorização, estatísticas e indexação prontos.<br>Hora do desafio autônomo!</p>
  </div>
  <div class="next-page" id="next-page" style="display:none">
    <div><div class="next-page-label">Prática concluída</div><div class="next-page-title">🏆 Desafio Autônomo — Introdução ao NumPy</div></div>
    <a class="next-page-btn" href="a06_desafio.html">Abrir Desafio →</a>
  </div>
</div>
<script>
const STEPS=[
{title:'Criar arrays e explorar shape e dtype',time:'8 min',
instrs:['Importe NumPy como np e crie um array de 6 temperaturas (valores float)','Inspecione: .shape, .dtype, .ndim e .size','Crie também um array 2D de 2 linhas e 3 colunas com np.array([[...],[...]])','Use np.zeros(5), np.ones(5) e np.arange(0, 30, 5) e observe os resultados'],
code:`<span class="k">import</span> <span class="p">numpy</span> <span class="k">as</span> <span class="p">np</span>\n\n<span class="p">temps</span> = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">28.5</span>, <span class="v">31.2</span>, <span class="v">25.0</span>, <span class="v">33.1</span>, <span class="v">27.8</span>, <span class="v">29.4</span>])\n\n<span class="fn">print</span>(<span class="p">temps</span>.<span class="fn">shape</span>)   <span class="c"># (6,)</span>\n<span class="fn">print</span>(<span class="p">temps</span>.<span class="fn">dtype</span>)   <span class="c"># float64</span>\n<span class="fn">print</span>(<span class="p">temps</span>.<span class="fn">ndim</span>)    <span class="c"># 1</span>\n<span class="fn">print</span>(<span class="p">temps</span>.<span class="fn">size</span>)    <span class="c"># 6`,
tip:'<strong>Sempre verifique shape antes de operar.</strong> A maioria dos erros em ML vem de shapes incompatíveis — (6,) e (6,1) parecem iguais mas se comportam diferente em operações matriciais.'},
{title:'Vetorização — sem loops',time:'10 min',
instrs:['Com as temperaturas em Celsius do passo anterior, converta todas para Fahrenheit: <code>F = C * 9/5 + 32</code>','Faça isso em uma única linha — sem for, sem append','Normalize as temperaturas para o intervalo [0, 1] usando min-max','Compare: faça o mesmo com uma lista Python usando for e veja a diferença de código'],
code:`<span class="c"># Conversao vetorizada — uma linha!</span>\n<span class="p">temps_f</span> = <span class="p">temps</span> * <span class="v">9</span>/<span class="v">5</span> + <span class="v">32</span>\n<span class="fn">print</span>(<span class="fn">np</span>.<span class="fn">round</span>(<span class="p">temps_f</span>, <span class="v">1</span>))\n\n<span class="c"># Normalizacao min-max</span>\n<span class="p">norm</span> = (<span class="p">temps</span> - <span class="p">temps</span>.<span class="fn">min</span>()) / (<span class="p">temps</span>.<span class="fn">max</span>() - <span class="p">temps</span>.<span class="fn">min</span>())\n<span class="fn">print</span>(<span class="fn">np</span>.<span class="fn">round</span>(<span class="p">norm</span>, <span class="v">2</span>))`,
tip:'<strong>Normalizacao min-max</strong> mapeia todos os valores para [0, 1]. É um dos pré-processamentos mais usados em ML — modelos treinados com dados normalizados convergem mais rápido.'},
{title:'Estatísticas descritivas',time:'8 min',
instrs:['Crie um array de 8 notas de alunos (valores entre 2 e 10)','Calcule: média, desvio padrão, mediana, mínimo e máximo','Use argmax() e argmin() para descobrir em qual posição estão a maior e a menor nota','Calcule quantas notas estão acima da média usando indexação booleana + .sum()'],
code:`<span class="p">notas</span> = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">7.5</span>, <span class="v">8.0</span>, <span class="v">5.5</span>, <span class="v">9.0</span>, <span class="v">4.0</span>, <span class="v">6.5</span>, <span class="v">8.5</span>, <span class="v">3.5</span>])\n\n<span class="fn">print</span>(<span class="s">f"Media: {notas.mean():.2f}"</span>)\n<span class="fn">print</span>(<span class="s">f"Desvio: {notas.std():.2f}"</span>)\n<span class="fn">print</span>(<span class="s">f"Mediana: {np.median(notas):.2f}"</span>)\n\n<span class="p">acima_media</span> = (notas > notas.<span class="fn">mean</span>()).<span class="fn">sum</span>()\n<span class="fn">print</span>(<span class="s">f"Acima da media: {acima_media}"</span>)`,
tip:'<strong>std() vs desvio manual:</strong> np.std() usa por padrão divisao por N (população). Para amostra (mais comum em estatística), use <code>notas.std(ddof=1)</code>. Em ML, a versao populacional é a mais usada.'},
{title:'Indexação e seleção booleana',time:'10 min',
instrs:['Com o array de notas, use indexação booleana para filtrar apenas os aprovados (nota >= 5)','Use indexação para pegar os 3 primeiros e os 3 últimos elementos','Substitua todas as notas abaixo de 5 por 5.0 usando indexação booleana: <code>arr[arr < 5] = 5</code>','Confirme que nao há mais notas abaixo de 5 após a substituição'],
code:`<span class="p">notas</span> = <span class="p">np</span>.<span class="fn">array</span>([<span class="v">7.5</span>, <span class="v">4.0</span>, <span class="v">9.0</span>, <span class="v">3.5</span>, <span class="v">6.5</span>, <span class="v">8.0</span>])\n\n<span class="c"># Filtrar aprovados</span>\n<span class="fn">print</span>(<span class="p">notas</span>[<span class="p">notas</span> >= <span class="v">5</span>])\n\n<span class="c"># Corrigir reprovados para nota minima</span>\n<span class="p">notas_corr</span> = <span class="p">notas</span>.<span class="fn">copy</span>()  <span class="c"># copia antes de alterar!</span>\n<span class="p">notas_corr</span>[<span class="p">notas_corr</span> < <span class="v">5</span>] = <span class="v">5.0</span>\n<span class="fn">print</span>(<span class="p">notas_corr</span>)`,
tip:'<strong>Sempre use .copy() antes de modificar um array por indexação booleana.</strong> Arrays NumPy sao modificados no lugar (in-place). Sem copy(), você estaria alterando o original — o que geralmente nao é o desejado.'},
{title:'reshape e matrizes 2D',time:'10 min',
instrs:['Crie um array de 12 elementos com np.arange(12) e o transforme em uma matriz 3x4 com reshape','Acesse: a linha 1 inteira, a coluna 2 inteira e o elemento da linha 2 coluna 3','Use m.mean(axis=0) para calcular a média de cada coluna e m.mean(axis=1) para cada linha','Observe a diferença entre axis=0 e axis=1 — fundamental para entender operações em DataFrames'],
code:`<span class="p">m</span> = <span class="p">np</span>.<span class="fn">arange</span>(<span class="v">12</span>).<span class="fn">reshape</span>(<span class="v">3</span>, <span class="v">4</span>)\n<span class="fn">print</span>(<span class="p">m</span>)\n\n<span class="fn">print</span>(<span class="s">"Linha 1:"</span>, <span class="p">m</span>[<span class="v">1</span>, :])\n<span class="fn">print</span>(<span class="s">"Coluna 2:"</span>, <span class="p">m</span>[:, <span class="v">2</span>])\n\n<span class="c"># axis=0 opera sobre linhas (por coluna)</span>\n<span class="fn">print</span>(<span class="s">"Media por coluna:"</span>, <span class="p">m</span>.<span class="fn">mean</span>(<span class="p">axis</span>=<span class="v">0</span>))\n<span class="c"># axis=1 opera sobre colunas (por linha)</span>\n<span class="fn">print</span>(<span class="s">"Media por linha:"</span>,  <span class="p">m</span>.<span class="fn">mean</span>(<span class="p">axis</span>=<span class="v">1</span>))`,
tip:'<strong>axis=0 vs axis=1</strong> confunde muito no início. Pense assim: axis=0 "colapsa" as linhas (resultado tem shape de coluna). axis=1 "colapsa" as colunas (resultado tem shape de linha). Esse conceito é idêntico no Pandas.'},
{title:'Projeto integrador — análise de sensores',time:'14 min',
instrs:['Crie um array 2D simulando leituras de 4 sensores ao longo de 5 dias (use np.random.seed(42) e np.random.uniform(20, 35, (5, 4)))','Calcule a temperatura média de cada sensor (média por coluna com axis=0)','Identifique qual sensor teve a maior variação (maior desvio padrão por coluna)','Crie uma máscara booleana para identificar leituras acima de 30 graus e conte quantas ocorreram por sensor'],
code:`<span class="p">np</span>.<span class="fn">random</span>.<span class="fn">seed</span>(<span class="v">42</span>)\n<span class="p">sensores</span> = <span class="p">np</span>.<span class="fn">random</span>.<span class="fn">uniform</span>(<span class="v">20</span>, <span class="v">35</span>, (<span class="v">5</span>, <span class="v">4</span>))\n<span class="p">sensores</span> = <span class="p">np</span>.<span class="fn">round</span>(<span class="p">sensores</span>, <span class="v">1</span>)\n\n<span class="fn">print</span>(<span class="s">"Shape:"</span>, <span class="p">sensores</span>.<span class="fn">shape</span>)  <span class="c"># (5, 4)</span>\n<span class="fn">print</span>(<span class="s">"Media/sensor:"</span>, <span class="p">sensores</span>.<span class="fn">mean</span>(<span class="p">axis</span>=<span class="v">0</span>).<span class="fn">round</span>(<span class="v">1</span>))\n<span class="fn">print</span>(<span class="s">"Maior variacao: sensor"</span>, <span class="p">np</span>.<span class="fn">argmax</span>(<span class="p">sensores</span>.<span class="fn">std</span>(<span class="p">axis</span>=<span class="v">0</span>)))\n<span class="fn">print</span>(<span class="s">"Alertas >30 por sensor:"</span>, (<span class="p">sensores</span> > <span class="v">30</span>).<span class="fn">sum</span>(<span class="p">axis</span>=<span class="v">0</span>))`,
tip:'<strong>Este é o padrão de análise de dados em ML:</strong> carregar dados em array 2D, calcular estatísticas por eixo, identificar anomalias com indexação booleana. Pandas e NumPy usam a mesma lógica de axis.'}
];
let done=new Set();
function build(){
  const list=document.getElementById('steps');STEPS.forEach((s,i)=>{
    const card=document.createElement('div');card.className='sc'+(i===0?' open-c':'');card.id='sc-'+i;
    card.innerHTML=`<div class="sh" onclick="tog(${i})"><div class="chk" id="chk-${i}" onclick="event.stopPropagation();mk(${i})"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="si"><div class="sn2">Passo ${i+1} de ${STEPS.length}</div><div class="st">${s.title}</div><div class="stm">${s.time}</div></div><span class="cv">${i===0?'▲':'▼'}</span></div><div class="sb"><div class="sbi"><div class="il">${s.instrs.map((t,j)=>`<div class="ii"><div class="in">${j+1}</div><span>${t}</span></div>`).join('')}</div>${s.code?`<div class="cb2">${s.code}</div>`:''}<div class="tip">${s.tip}</div><button class="mb" id="mb-${i}" onclick="mk(${i})"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Marcar como concluído</button></div></div>`;
    list.appendChild(card);
  });
}
function tog(i){const c=document.getElementById('sc-'+i);const o=c.classList.contains('open-c');document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').textContent='▼';});if(!o){c.classList.add('open-c');c.querySelector('.cv').textContent='▲';}}
function mk(i){if(done.has(i))return;done.add(i);document.getElementById('chk-'+i).classList.add('done');document.getElementById('sc-'+i).classList.add('done-c');const mb=document.getElementById('mb-'+i);mb.classList.add('done-btn');mb.innerHTML='<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Concluído!';upd();if(i<STEPS.length-1){document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').textContent='▼';});const nx=document.getElementById('sc-'+(i+1));nx.classList.add('open-c');nx.querySelector('.cv').textContent='▲';setTimeout(()=>nx.scrollIntoView({behavior:'smooth',block:'nearest'}),100);}if(done.size===STEPS.length){document.getElementById('sbox').classList.add('show');document.getElementById('next-page').style.display='flex';setTimeout(()=>document.getElementById('next-page').scrollIntoView({behavior:'smooth',block:'nearest'}),300);}}
function upd(){document.getElementById('pf').style.width=Math.round((done.size/STEPS.length)*100)+'%';document.getElementById('pt').textContent=done.size+' / '+STEPS.length;}
build();upd();
</script>
</body>
</html>
