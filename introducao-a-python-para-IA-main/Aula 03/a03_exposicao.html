<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Repetição com for e while · Aula 03</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#7c3aed;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#7c3aed;transform:scale(1.4)}.dot.done{background:#c4b5fd;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#7c3aed;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #7c3aed}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}
.hl{background:#f5f3ff;border-left:3px solid #7c3aed;padding:10px 13px;font-size:12.5px;color:#3b0764;line-height:1.55;margin:10px 0}
.hl strong{color:#6d28d9;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#7c3aed;color:#fff;border-color:#7c3aed}
.nb.pr:hover{background:#6d28d9}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}
.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#c4b5fd;background:#f5f3ff}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#f5f3ff;color:#7c3aed;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
/* Atalho para próxima página */
.next-page{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#7c3aed}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#7c3aed;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#6d28d9}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 03</span>
      <div><div class="hdr-title">Repetição com for e while · Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-wrap" id="slide-wrap"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="goNav(-1)" disabled>← Anterior</button>
    <span class="nc" id="counter">1 / 9</span>
    <button class="nb pr" id="btn-next" onclick="goNav(1)">Próximo →</button>
  </div>
</div>
<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">O programa aprende a repetir — sem copiar código</div><div class="ssub">Nas aulas anteriores, cada instrução executava uma vez. E se precisarmos fazer a mesma coisa 100 vezes? Copiar não é solução — laços são.</div><div class="cards"><div class="card ac"><div class="ci">🔁</div><div class="ct">O problema da repetição</div><div class="cb">Imprimir os números de 1 a 100 copiando 100 <code>print()</code> é inviável. O laço faz isso em 2 linhas — e funciona para 1 milhão também.</div></div><div class="card ac"><div class="ci">📋</div><div class="ct">Dois tipos de laço</div><div class="cb"><code>for</code>: repete um número conhecido de vezes ou percorre uma sequência. <code>while</code>: repete enquanto uma condição for True.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Sem usar computador: como vocês escreveriam uma instrução para que alguém repetisse \'Bom dia\' 5 vezes? E 100 vezes?"</em></div></div><div class="card"><div class="ci">🎯</div><div class="ct">O que veremos hoje</div><div class="cb"><code>for</code> com <code>range()</code>, <code>for</code> sobre listas, <code>while</code>, <code>break</code>, <code>continue</code> e acumuladores.</div></div></div>';},
function(){return '<div class="ey">for com range() · 4 min</div><div class="stitle">for — repetindo um número fixo de vezes</div><div class="ssub">O <code>for</code> com <code>range()</code> é o laço mais usado para repetir algo N vezes. A variável do laço assume cada valor da sequência automaticamente.</div><div class="cw"><div class="ch"><span>Python · for com range()</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># range(5) gera: 0, 1, 2, 3, 4</span>\n<span class="k">for</span> <span class="p">i</span> <span class="k">in</span> <span class="fn">range</span>(<span class="v">5</span>):\n    <span class="fn">print</span>(<span class="p">i</span>)\n\n<span class="cm"># range(1, 6) gera: 1, 2, 3, 4, 5</span>\n<span class="k">for</span> <span class="p">i</span> <span class="k">in</span> <span class="fn">range</span>(<span class="v">1</span>, <span class="v">6</span>):\n    <span class="fn">print</span>(<span class="s">f"Repetição {i}"</span>)\n\n<span class="cm"># range(0, 11, 2) gera: 0, 2, 4, 6, 8, 10</span>\n<span class="k">for</span> <span class="p">n</span> <span class="k">in</span> <span class="fn">range</span>(<span class="v">0</span>, <span class="v">11</span>, <span class="v">2</span>):\n    <span class="fn">print</span>(<span class="p">n</span>)   <span class="cm"># pares de 0 a 10</span></pre></div><div class="cards"><div class="card ac"><div class="ci">1️⃣</div><div class="ct">range(n)</div><div class="cb">De 0 até n-1. <code>range(5)</code> → 0,1,2,3,4. Sempre começa em zero.</div></div><div class="card ac"><div class="ci">2️⃣</div><div class="ct">range(início, fim)</div><div class="cb">Do início até fim-1. <code>range(1,6)</code> → 1,2,3,4,5. O fim nunca é incluído.</div></div><div class="card ac"><div class="ci">3️⃣</div><div class="ct">range(início, fim, passo)</div><div class="cb">Avança de passo em passo. <code>range(0,10,2)</code> → 0,2,4,6,8. Passo negativo anda de trás para frente.</div></div></div>';},
function(){return '<div class="ey">for sobre lista · 3 min</div><div class="stitle">for percorrendo uma lista — item por item</div><div class="ssub">O <code>for</code> não serve só para números. Ele percorre qualquer sequência: listas, strings, e mais. A variável recebe cada elemento automaticamente.</div><div class="cw"><div class="ch"><span>Python · for sobre listas e strings</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># for percorrendo uma lista</span>\n<span class="p">frutas</span> = [<span class="s">"maçã"</span>, <span class="s">"banana"</span>, <span class="s">"laranja"</span>]\n\n<span class="k">for</span> <span class="p">fruta</span> <span class="k">in</span> <span class="p">frutas</span>:\n    <span class="fn">print</span>(<span class="s">f"Fruta: {fruta}"</span>)\n\n<span class="cm"># for percorrendo uma string (letra por letra)</span>\n<span class="k">for</span> <span class="p">letra</span> <span class="k">in</span> <span class="s">"Python"</span>:\n    <span class="fn">print</span>(<span class="p">letra</span>)\n\n<span class="cm"># for com índice usando enumerate()</span>\n<span class="p">nomes</span> = [<span class="s">"Ana"</span>, <span class="s">"Bruno"</span>, <span class="s">"Carla"</span>]\n<span class="k">for</span> <span class="p">i</span>, <span class="p">nome</span> <span class="k">in</span> <span class="fn">enumerate</span>(<span class="p">nomes</span>):\n    <span class="fn">print</span>(<span class="s">f"{i+1}. {nome}"</span>)</pre></div><div class="hl"><strong>enumerate()</strong> dá o índice e o valor ao mesmo tempo. Em vez de <code>for i in range(len(lista))</code>, use <code>for i, item in enumerate(lista)</code>. É mais legível e considerado Pythônico.</div>';},
function(){return '<div class="ey">Acumuladores · 3 min</div><div class="stitle">Acumulando resultados dentro do for</div><div class="ssub">Um padrão fundamental: iniciar uma variável fora do laço e atualizá-la a cada repetição. Serve para somar, contar, construir strings e muito mais.</div><div class="cw"><div class="ch"><span>Python · Acumuladores e contadores</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Somar todos os números de 1 a 100</span>\n<span class="p">total</span> = <span class="v">0</span>            <span class="cm"># acumulador começa em 0</span>\n<span class="k">for</span> <span class="p">n</span> <span class="k">in</span> <span class="fn">range</span>(<span class="v">1</span>, <span class="v">101</span>):\n    <span class="p">total</span> = <span class="p">total</span> + <span class="p">n</span>  <span class="cm"># ou: total += n</span>\n<span class="fn">print</span>(<span class="p">total</span>)           <span class="cm"># 5050</span>\n\n<span class="cm"># Contar quantos números são pares</span>\n<span class="p">pares</span> = <span class="v">0</span>\n<span class="k">for</span> <span class="p">n</span> <span class="k">in</span> <span class="fn">range</span>(<span class="v">1</span>, <span class="v">21</span>):\n    <span class="k">if</span> <span class="p">n</span> % <span class="v">2</span> == <span class="v">0</span>:\n        <span class="p">pares</span> += <span class="v">1</span>\n<span class="fn">print</span>(<span class="s">f"Pares de 1 a 20: {pares}"</span>)  <span class="cm"># 10</span>\n\n<span class="cm"># Calcular média de uma lista de notas</span>\n<span class="p">notas</span> = [<span class="v">7.5</span>, <span class="v">8.0</span>, <span class="v">6.5</span>, <span class="v">9.0</span>, <span class="v">7.0</span>]\n<span class="p">media</span> = <span class="fn">sum</span>(<span class="p">notas</span>) / <span class="fn">len</span>(<span class="p">notas</span>)\n<span class="fn">print</span>(<span class="s">f"Média: {media:.1f}"</span>)</pre></div>';},
function(){return '<div class="ey">while · 4 min</div><div class="stitle">while — repete enquanto a condição for True</div><div class="ssub">Use <code>while</code> quando não sabe quantas vezes vai repetir — depende de uma condição. Cuidado: esquecer de atualizar a condição cria loop infinito.</div><div class="cw"><div class="ch"><span>Python · while na prática</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># while básico — conta de 1 a 5</span>\n<span class="p">contador</span> = <span class="v">1</span>\n<span class="k">while</span> <span class="p">contador</span> <= <span class="v">5</span>:\n    <span class="fn">print</span>(<span class="p">contador</span>)\n    <span class="p">contador</span> += <span class="v">1</span>   <span class="cm"># ESSENCIAL! sem isso: loop infinito</span>\n\n<span class="cm"># while aguardando entrada válida</span>\n<span class="p">senha</span> = <span class="s">""</span>\n<span class="k">while</span> <span class="p">senha</span> != <span class="s">"1234"</span>:\n    <span class="p">senha</span> = <span class="fn">input</span>(<span class="s">"Digite a senha: "</span>)\n    <span class="k">if</span> <span class="p">senha</span> != <span class="s">"1234"</span>:\n        <span class="fn">print</span>(<span class="s">"Senha errada, tente novamente."</span>)\n<span class="fn">print</span>(<span class="s">"Acesso liberado!"</span>)</pre></div><div class="compare"><div class="cs"><div class="csh" style="background:#fef2f2;color:#991b1b">⚠️ Loop infinito</div><div class="csb"><code>n = 1</code><br><code>while n &lt; 10:</code><br><code>&nbsp;&nbsp;&nbsp;&nbsp;print(n)</code><br><em># esqueceu o n += 1 !</em><br><br>O programa nunca para. No Colab, clique no ⏹ para interromper.</div></div><div class="cs"><div class="csh" style="background:#f0fdf4;color:#15803d">✅ Correto</div><div class="csb"><code>n = 1</code><br><code>while n &lt; 10:</code><br><code>&nbsp;&nbsp;&nbsp;&nbsp;print(n)</code><br><code>&nbsp;&nbsp;&nbsp;&nbsp;n += 1</code><br><br>Sempre atualize a variável da condição dentro do while.</div></div></div>';},
function(){return '<div class="ey">break e continue · 3 min</div><div class="stitle">break e continue — controlando o laço</div><div class="ssub"><code>break</code> interrompe o laço imediatamente. <code>continue</code> pula para a próxima iteração sem executar o restante do bloco. São úteis mas devem ser usados com parcimônia.</div><div class="cw"><div class="ch"><span>Python · break e continue</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># break — sai do laço quando encontra algo</span>\n<span class="p">numeros</span> = [<span class="v">3</span>, <span class="v">7</span>, <span class="v">2</span>, <span class="v">9</span>, <span class="v">4</span>, <span class="v">6</span>]\n<span class="k">for</span> <span class="p">n</span> <span class="k">in</span> <span class="p">numeros</span>:\n    <span class="k">if</span> <span class="p">n</span> == <span class="v">9</span>:\n        <span class="fn">print</span>(<span class="s">"Encontrei o 9! Parando."</span>)\n        <span class="k">break</span>\n    <span class="fn">print</span>(<span class="p">n</span>)\n\n<span class="cm"># continue — pula o número se for par</span>\n<span class="k">for</span> <span class="p">n</span> <span class="k">in</span> <span class="fn">range</span>(<span class="v">1</span>, <span class="v">11</span>):\n    <span class="k">if</span> <span class="p">n</span> % <span class="v">2</span> == <span class="v">0</span>:\n        <span class="k">continue</span>   <span class="cm"># pula pares</span>\n    <span class="fn">print</span>(<span class="p">n</span>)        <span class="cm"># imprime só ímpares: 1,3,5,7,9</span></pre></div><div class="hl"><strong>for vs while — quando usar cada um:</strong> use <code>for</code> quando sabe quantas vezes vai repetir ou tem uma sequência para percorrer. Use <code>while</code> quando a repetição depende de uma condição que muda durante a execução.</div>';},
function(){return '<div class="ey">Exemplo completo · 3 min</div><div class="stitle">Tabuada e média de notas — juntando tudo</div><div class="ssub">Dois exemplos práticos que combinam for, range(), acumuladores e f-strings — padrões que aparecem em todo projeto de dados.</div><div class="cw"><div class="ch"><span>Python · Tabuada + média de notas</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Tabuada de qualquer número</span>\n<span class="p">n</span> = <span class="fn">int</span>(<span class="fn">input</span>(<span class="s">"Tabuada de qual número? "</span>))\n<span class="fn">print</span>(<span class="s">f"\\n=== Tabuada do {n} ==="</span>)\n<span class="k">for</span> <span class="p">i</span> <span class="k">in</span> <span class="fn">range</span>(<span class="v">1</span>, <span class="v">11</span>):\n    <span class="fn">print</span>(<span class="s">f"{n} x {i:2} = {n*i:3}"</span>)\n\n<span class="cm"># Coletar N notas e calcular a média</span>\n<span class="p">qtd</span>   = <span class="fn">int</span>(<span class="fn">input</span>(<span class="s">"Quantas notas? "</span>))\n<span class="p">soma</span>  = <span class="v">0</span>\n<span class="k">for</span> <span class="p">i</span> <span class="k">in</span> <span class="fn">range</span>(<span class="v">1</span>, <span class="p">qtd</span> + <span class="v">1</span>):\n    <span class="p">nota</span> = <span class="fn">float</span>(<span class="fn">input</span>(<span class="s">f"Nota {i}: "</span>))\n    <span class="p">soma</span> += <span class="p">nota</span>\n<span class="p">media</span> = <span class="p">soma</span> / <span class="p">qtd</span>\n<span class="fn">print</span>(<span class="s">f"Média da turma: {media:.1f}"</span>)</pre></div><div class="hl"><strong>:2 e :3 dentro de f-strings</strong> alinham os números — :2 reserva 2 casas, :3 reserva 3. Isso deixa a tabuada alinhada em colunas no terminal.</div>';},
function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. O que <code>range(2, 10, 3)</code> gera?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>2, 3, 4, 5, 6, 7, 8, 9</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>B</span>2, 5, 8</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>C</span>2, 4, 6, 8, 10</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span>3, 6, 9</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! range(início, fim, passo): começa em 2, vai até 9 (não inclui 10), de 3 em 3. Então: 2, 5, 8.</div></div><div class="qb"><div class="qa">2. Qual a diferença principal entre <code>for</code> e <code>while</code>?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>A</span>for é mais rápido que while</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>B</span>while só funciona com números</div><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>C</span>for percorre sequências conhecidas; while repete enquanto uma condição for True</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span>for não pode usar break</div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! Use for quando sabe quantas vezes repetir ou tem uma sequência. Use while quando a repetição depende de uma condição que muda durante a execução.</div></div>';},
function(){return '<div class="ey">Encerramento · 1 min</div><div class="stitle">Recapitulando</div><div class="ssub">O que aprendemos e o que faremos agora.</div><div class="rl"><div class="ri"><div class="rn">1</div><div class="rt"><strong>for com range()</strong> repete N vezes. <code>range(n)</code> vai de 0 a n-1. <code>range(a,b,passo)</code> oferece controle total.</div></div><div class="ri"><div class="rn">2</div><div class="rt"><strong>for sobre listas</strong> percorre cada elemento automaticamente. <code>enumerate()</code> dá índice e valor juntos.</div></div><div class="ri"><div class="rn">3</div><div class="rt"><strong>Acumuladores</strong> iniciam fora do laço e são atualizados dentro. Padrão fundamental para somar, contar e calcular médias.</div></div><div class="ri"><div class="rn">4</div><div class="rt"><strong>while</strong> repete enquanto a condição for True. Sempre atualize a variável da condição para evitar loop infinito.</div></div><div class="ri"><div class="rn">5</div><div class="rt"><strong>break</strong> sai do laço imediatamente. <strong>continue</strong> pula para a próxima iteração. Use com cuidado.</div></div></div><div class="next-page"><div><div class="next-page-label">Próxima etapa</div><div class="next-page-title">▶ Demo ao Vivo — Repetição com for e while</div></div><a class="next-page-btn" href="a03_demo_ao_vivo.html">Abrir Demo →</a></div>';}
];
function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=30*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Não exatamente — reveja os conceitos de range() e os dois tipos de laço.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
