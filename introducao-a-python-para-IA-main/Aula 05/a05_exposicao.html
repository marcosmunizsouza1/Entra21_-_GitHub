<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Funções e Reutilização de Código · Aula 05</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#d97706;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#d97706;transform:scale(1.4)}.dot.done{background:#fcd34d;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#d97706;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #d97706}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}
.hl{background:#fffbeb;border-left:3px solid #d97706;padding:10px 13px;font-size:12.5px;color:#78350f;line-height:1.55;margin:10px 0}
.hl strong{color:#92400e;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#d97706;color:#fff;border-color:#d97706}
.nb.pr:hover{background:#b45309}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}
.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#fcd34d;background:#fffbeb}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#fef3c7;color:#d97706;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.next-page{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#d97706}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#d97706;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#b45309}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 05</span>
      <div><div class="hdr-title">Funções e Reutilização de Código · Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-wrap" id="slide-wrap"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="goNav(-1)" disabled>← Anterior</button>
    <span class="nc" id="counter">1 / 9</span>
    <button class="nb pr" id="btn-next" onclick="goNav(1)">Próximo →</button>
  </div>
</div>
<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">Funções — blocos de código com nome e propósito</div><div class="ssub">Nas aulas anteriores escrevemos tudo em sequência. Conforme o programa cresce, repetir código se torna um problema. Funções resolvem isso.</div><div class="cards"><div class="card ac"><div class="ci">♻️</div><div class="ct">Reutilização</div><div class="cb">Escreva uma vez, use quantas vezes quiser. Precisa calcular o IMC em 3 lugares do programa? Escreva a função uma vez e chame em todos.</div></div><div class="card ac"><div class="ci">🧩</div><div class="ct">Organização</div><div class="cb">Cada função tem uma responsabilidade. Em vez de 100 linhas seguidas, o programa vira uma sequência de chamadas com nomes descritivos.</div></div><div class="card ac"><div class="ci">🔧</div><div class="ct">Manutenção</div><div class="cb">Achou um bug? Corrige em um lugar só. Sem função, precisaria achar e corrigir o mesmo erro em cada cópia do código.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Olhem o programa da Aula 04. Quantas vezes repetiram o mesmo cálculo de media? Como seria se precisassem corrigir a fórmula em 5 lugares?"</em></div></div></div>';},
function(){return '<div class="ey">Sintaxe · 4 min</div><div class="stitle">def — criando a primeira função</div><div class="ssub">A palavra <code>def</code> define uma função. Ela tem um nome, pode receber parâmetros e pode retornar um valor com <code>return</code>.</div><div class="cw"><div class="ch"><span>Python · Anatomia de uma função</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># def → nome → parâmetros → dois-pontos</span>\n<span class="k">def</span> <span class="fn">saudacao</span>(<span class="p">nome</span>):\n    <span class="s">"""Exibe uma saudação personalizada."""</span>\n    <span class="fn">print</span>(<span class="s">f"Olá, {nome}! Bem-vindo."</span>)\n\n<span class="cm"># Chamar a função</span>\n<span class="fn">saudacao</span>(<span class="s">"Ana"</span>)      <span class="cm"># Olá, Ana! Bem-vindo.</span>\n<span class="fn">saudacao</span>(<span class="s">"Bruno"</span>)    <span class="cm"># Olá, Bruno! Bem-vindo.</span>\n<span class="fn">saudacao</span>(<span class="s">"Carla"</span>)    <span class="cm"># Olá, Carla! Bem-vindo.</span>\n\n<span class="cm"># Sem função precisaríamos repetir o print 3x</span>\n<span class="cm"># Com função: escrevemos 1x e chamamos 3x</span></pre></div><div class="hl"><strong>Docstring:</strong> o texto entre aspas triplas logo após o def é a documentação da função. Aparece no help() e facilita a manutenção. Boa prática em qualquer projeto.</div>';},
function(){return '<div class="ey">return · 4 min</div><div class="stitle">return — a função entrega um resultado</div><div class="ssub"><code>return</code> encerra a função e devolve um valor para quem a chamou. Sem <code>return</code>, a função executa mas devolve <code>None</code>.</div><div class="cw"><div class="ch"><span>Python · return na prática</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Função SEM return — só executa, nao devolve</span>\n<span class="k">def</span> <span class="fn">mostrar_imc</span>(<span class="p">peso</span>, <span class="p">altura</span>):\n    <span class="p">imc</span> = <span class="p">peso</span> / <span class="p">altura</span> ** <span class="v">2</span>\n    <span class="fn">print</span>(<span class="s">f"IMC: {imc:.1f}"</span>)  <span class="cm"># só exibe</span>\n\n<span class="cm"># Função COM return — calcula e devolve</span>\n<span class="k">def</span> <span class="fn">calcular_imc</span>(<span class="p">peso</span>, <span class="p">altura</span>):\n    <span class="k">return</span> <span class="p">peso</span> / <span class="p">altura</span> ** <span class="v">2</span>\n\n<span class="cm"># Agora podemos usar o valor retornado</span>\n<span class="p">imc</span> = <span class="fn">calcular_imc</span>(<span class="v">70</span>, <span class="v">1.75</span>)\n<span class="fn">print</span>(<span class="s">f"IMC: {imc:.1f}"</span>)\n\n<span class="k">if</span> <span class="fn">calcular_imc</span>(<span class="v">70</span>, <span class="v">1.75</span>) < <span class="v">25</span>:\n    <span class="fn">print</span>(<span class="s">"Peso normal"</span>)</pre></div><div class="hl"><strong>Prefira return a print dentro de funções.</strong> Uma função que retorna o valor é reutilizável em qualquer contexto. Uma que só imprime só serve para exibir — nao pode ser usada em cálculos.</div>';},
function(){return '<div class="ey">Parâmetros · 4 min</div><div class="stitle">Parâmetros e valores padrão</div><div class="ssub">Parâmetros tornam as funções flexíveis. Valores padrão tornam parâmetros opcionais — a função funciona mesmo sem recebê-los.</div><div class="cw"><div class="ch"><span>Python · Parâmetros e valores padrão</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Parâmetro com valor padrão</span>\n<span class="k">def</span> <span class="fn">saudacao</span>(<span class="p">nome</span>, <span class="p">turno</span>=<span class="s">"dia"</span>):\n    <span class="fn">print</span>(<span class="s">f"Bom {turno}, {nome}!"</span>)\n\n<span class="fn">saudacao</span>(<span class="s">"Ana"</span>)              <span class="cm"># Bom dia, Ana!</span>\n<span class="fn">saudacao</span>(<span class="s">"Bruno"</span>, <span class="s">"tarde"</span>)  <span class="cm"># Bom tarde, Bruno!</span>\n<span class="fn">saudacao</span>(<span class="s">"Carla"</span>, <span class="s">"noite"</span>)  <span class="cm"># Bom noite, Carla!</span>\n\n<span class="cm"># Argumentos nomeados — ordem nao importa</span>\n<span class="k">def</span> <span class="fn">criar_perfil</span>(<span class="p">nome</span>, <span class="p">idade</span>, <span class="p">cidade</span>=<span class="s">"SP"</span>):\n    <span class="k">return</span> {<span class="s">"nome"</span>: <span class="p">nome</span>, <span class="s">"idade"</span>: <span class="p">idade</span>, <span class="s">"cidade"</span>: <span class="p">cidade</span>}\n\n<span class="fn">criar_perfil</span>(<span class="s">"Ana"</span>, <span class="v">25</span>)\n<span class="fn">criar_perfil</span>(<span class="p">cidade</span>=<span class="s">"RJ"</span>, <span class="p">nome</span>=<span class="s">"Bruno"</span>, <span class="p">idade</span>=<span class="v">30</span>)</pre></div><div class="hl"><strong>Regra:</strong> parâmetros com valor padrão sempre vêm depois dos obrigatórios. <code>def f(a, b=1)</code> é válido. <code>def f(a=1, b)</code> causa SyntaxError.</div>';},
function(){return '<div class="ey">Escopo · 3 min</div><div class="stitle">Escopo — onde a variável existe</div><div class="ssub">Variáveis criadas dentro de uma função existem somente ali. Esse isolamento é uma feature, nao um bug — evita que funções interfiram umas nas outras.</div><div class="compare"><div class="cs"><div class="csh" style="background:#fef2f2;color:#991b1b">❌ Erro de escopo</div><div class="csb"><pre style="background:#fef2f2;color:#dc2626;padding:8px;font-size:11px;border-radius:4px">def calcular():\n    resultado = 42\n\ncalcular()\nprint(resultado)  # NameError!\n# resultado nao existe aqui</pre>Variável local nao alcança fora.</div></div><div class="cs"><div class="csh" style="background:#f0fdf4;color:#15803d">✅ Correto — use return</div><div class="csb"><pre style="background:#f0fdf4;color:#15803d;padding:8px;font-size:11px;border-radius:4px">def calcular():\n    resultado = 42\n    return resultado\n\nx = calcular()\nprint(x)  # 42</pre>Return passa o valor para fora.</div></div></div><div class="cards"><div class="card ac"><div class="ci">🏠</div><div class="ct">Variável local</div><div class="cb">Criada dentro da função. Só existe enquanto a função roda. Cada chamada começa do zero.</div></div><div class="card ac"><div class="ci">🌍</div><div class="ct">Variável global</div><div class="cb">Criada fora de qualquer função. Visível em todo o arquivo. Use com moderação — dificulta a manutenção.</div></div><div class="card"><div class="ci">💡</div><div class="ct">Boa prática</div><div class="cb">Prefira funções que recebem tudo via parâmetros e retornam o resultado. Evite ler variáveis globais dentro de funções.</div></div></div>';},
function(){return '<div class="ey">Múltiplos retornos · 2 min</div><div class="stitle">Retornando múltiplos valores com tupla</div><div class="ssub">Python permite retornar múltiplos valores de uma vez. Por baixo dos panos é uma tupla — e o desempacotamento da Aula 04 entra em ação.</div><div class="cw"><div class="ch"><span>Python · Múltiplos retornos</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">def</span> <span class="fn">estatisticas</span>(<span class="p">notas</span>):\n    <span class="s">"""Retorna media, maior e menor nota."""</span>\n    <span class="p">media</span> = <span class="fn">sum</span>(<span class="p">notas</span>) / <span class="fn">len</span>(<span class="p">notas</span>)\n    <span class="p">maior</span> = <span class="fn">max</span>(<span class="p">notas</span>)\n    <span class="p">menor</span> = <span class="fn">min</span>(<span class="p">notas</span>)\n    <span class="k">return</span> <span class="p">media</span>, <span class="p">maior</span>, <span class="p">menor</span>  <span class="cm"># tupla!</span>\n\n<span class="cm"># Desempacotamento direto</span>\n<span class="p">notas</span> = [<span class="v">7.5</span>, <span class="v">9.0</span>, <span class="v">5.5</span>, <span class="v">8.0</span>, <span class="v">6.0</span>]\n<span class="p">med</span>, <span class="p">max_</span>, <span class="p">min_</span> = <span class="fn">estatisticas</span>(<span class="p">notas</span>)\n\n<span class="fn">print</span>(<span class="s">f"Média: {med:.1f}"</span>)\n<span class="fn">print</span>(<span class="s">f"Maior: {max_} | Menor: {min_}"</span>)</pre></div>';},
function(){return '<div class="ey">Exemplo completo · 3 min</div><div class="stitle">Refatorando o programa de notas</div><div class="ssub">Vamos pegar o código da Aula 04 e organizar em funções. Cada responsabilidade vira uma função — o programa principal fica limpo e legível.</div><div class="cw"><div class="ch"><span>Python · Programa organizado em funções</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">def</span> <span class="fn">calcular_media</span>(<span class="p">notas</span>):\n    <span class="k">return</span> <span class="fn">sum</span>(<span class="p">notas</span>) / <span class="fn">len</span>(<span class="p">notas</span>)\n\n<span class="k">def</span> <span class="fn">classificar</span>(<span class="p">media</span>):\n    <span class="k">if</span> <span class="p">media</span> >= <span class="v">9</span>: <span class="k">return</span> <span class="s">"A"</span>\n    <span class="k">if</span> <span class="p">media</span> >= <span class="v">7</span>: <span class="k">return</span> <span class="s">"B"</span>\n    <span class="k">if</span> <span class="p">media</span> >= <span class="v">5</span>: <span class="k">return</span> <span class="s">"C"</span>\n    <span class="k">return</span> <span class="s">"Reprovado"</span>\n\n<span class="k">def</span> <span class="fn">relatorio_aluno</span>(<span class="p">aluno</span>):\n    <span class="p">media</span>   = <span class="fn">calcular_media</span>(<span class="p">aluno</span>[<span class="s">"notas"</span>])\n    <span class="p">conceito</span> = <span class="fn">classificar</span>(<span class="p">media</span>)\n    <span class="fn">print</span>(<span class="s">f"{aluno[\'nome\']:10} | média {media:.1f} | {conceito}"</span>)\n\n<span class="cm"># Programa principal — limpo e legível</span>\n<span class="p">turma</span> = [\n    {<span class="s">"nome"</span>: <span class="s">"Ana"</span>,   <span class="s">"notas"</span>: [<span class="v">8</span>, <span class="v">9</span>, <span class="v">7</span>]},\n    {<span class="s">"nome"</span>: <span class="s">"Bruno"</span>, <span class="s">"notas"</span>: [<span class="v">4</span>, <span class="v">5</span>, <span class="v">3</span>]},\n]\n<span class="k">for</span> <span class="p">aluno</span> <span class="k">in</span> <span class="p">turma</span>:\n    <span class="fn">relatorio_aluno</span>(<span class="p">aluno</span>)</pre></div>';},
function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. O que uma função retorna quando nao tem nenhum <code>return</code>?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>0 (zero)</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>B</span>False</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>C</span>None</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span>Causa um erro</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! Toda função Python retorna algum valor. Sem return explícito, ela retorna None automaticamente — o valor especial que representa "nada".</div></div><div class="qb"><div class="qa">2. Qual é o problema com a função abaixo?<br><code>def soma(a=0, b):</code></div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>A</span>Nao pode ter valor padrão em funções</div><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>B</span>Parâmetro com valor padrão nao pode vir antes de obrigatório</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>C</span>Falta o return</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span>Nao pode usar letra a e b como parâmetros</div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! SyntaxError: parâmetros com valor padrão sempre vêm depois dos obrigatórios. O correto seria: def soma(b, a=0) ou def soma(a, b=0).</div></div>';},
function(){return '<div class="ey">Encerramento · 1 min</div><div class="stitle">Recapitulando</div><div class="ssub">O que aprendemos e o que faremos agora.</div><div class="rl"><div class="ri"><div class="rn">1</div><div class="rt"><strong>def cria a função.</strong> Nome, parênteses com parâmetros, dois-pontos e corpo indentado. Docstring logo após o def.</div></div><div class="ri"><div class="rn">2</div><div class="rt"><strong>return devolve o resultado.</strong> Sem return, a função retorna None. Prefira return a print dentro de funções — o valor retornado é reutilizável.</div></div><div class="ri"><div class="rn">3</div><div class="rt"><strong>Parâmetros com padrão</strong> tornam argumentos opcionais. Sempre vêm depois dos obrigatórios: <code>def f(a, b=10)</code>.</div></div><div class="ri"><div class="rn">4</div><div class="rt"><strong>Escopo local:</strong> variáveis dentro da função nao existem fora. Use return para passar o valor para fora.</div></div><div class="ri"><div class="rn">5</div><div class="rt"><strong>Múltiplos retornos</strong> são tuplas. <code>return a, b</code> — desempacote com <code>x, y = funcao()</code>.</div></div></div><div class="next-page"><div><div class="next-page-label">Próxima etapa</div><div class="next-page-title">▶ Demo ao Vivo — Funções e Reutilização de Código</div></div><a class="next-page-btn" href="a05_demo_ao_vivo.html">Abrir Demo →</a></div>';}
];
function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=30*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Nao exatamente — relembre def, return e escopo.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
