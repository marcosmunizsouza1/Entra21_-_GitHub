<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prática Guiada — Condições e Decisões · Aula 02</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#ecfeff;min-height:100vh;padding:22px}
.wrap{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:11px}
.pg-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pg-title{font-size:17px;font-weight:600}.pg-meta{font-size:12px;color:#64748b;margin-top:2px}
.pg-time{font-size:12px;font-weight:600;background:#cffafe;border:1px solid #a5f3fc;padding:4px 12px;border-radius:8px;color:#0891b2}
.prog-row{display:flex;align-items:center;gap:9px}
.pb{flex:1;height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pf{height:100%;background:#0891b2;border-radius:4px;transition:width .4s ease;width:0%}
.pt{font-size:12px;font-weight:600;color:#64748b;min-width:60px;text-align:right}
.sc{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff;transition:border-color .2s}
.sc.done-c{border-color:#86efac}.sc.open-c{border-color:#67e8f9}
.sh{display:flex;align-items:flex-start;gap:11px;padding:12px 13px;cursor:pointer;user-select:none;transition:background .15s}
.sh:hover{background:#f8fafc}.sc.open-c .sh{background:#ecfeff}
.chk{width:21px;height:21px;border-radius:6px;border:1.5px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .18s;cursor:pointer;background:#fff}
.chk:hover{border-color:#0891b2;background:#cffafe}.chk.done{background:#22c55e;border-color:#22c55e}
.chk svg{display:none}.chk.done svg{display:block}
.si{flex:1}.sn2{font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.st{font-size:13px;font-weight:600;color:#1e293b;line-height:1.3}.stm{font-size:11px;color:#94a3b8;margin-top:2px}
.cv{color:#94a3b8;font-size:11px;margin-top:4px;transition:transform .22s;flex-shrink:0}
.sc.open-c .cv{transform:rotate(180deg)}
.sb{max-height:0;overflow:hidden;transition:max-height .35s ease}
.sc.open-c .sb{max-height:1600px}
.sbi{padding:0 13px 14px;border-top:1px solid #f1f5f9}
.il{display:flex;flex-direction:column;gap:6px;margin:11px 0}
.ii{display:flex;gap:9px;font-size:13px;color:#475569;line-height:1.55;align-items:flex-start}
.in{width:19px;height:19px;min-width:19px;border-radius:5px;background:#cffafe;color:#0891b2;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cb2{background:#1e293b;border-radius:8px;padding:12px 15px;font-family:'Courier New',monospace;font-size:12px;line-height:1.8;color:#94a3b8;margin:9px 0;overflow-x:auto;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.c{color:#475569;font-style:italic}.fn{color:#fbbf24}
.tip{background:#ecfeff;border-left:3px solid #0891b2;padding:8px 12px;font-size:12px;color:#164e63;line-height:1.5;margin-top:8px}
.tip strong{color:#0e7490;font-weight:600}
.mb{display:inline-flex;align-items:center;gap:5px;background:#f8fafc;border:1px solid #cbd5e1;color:#64748b;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;margin-top:10px}
.mb:hover{background:#f0fdf4;color:#15803d;border-color:#86efac}
.mb.done-btn{background:#f0fdf4;color:#15803d;border-color:#86efac;pointer-events:none}
.sbox{background:#ecfeff;border:1px solid #67e8f9;border-radius:14px;padding:20px;text-align:center;display:none}
.sbox.show{display:block}
.sbox h3{font-size:16px;font-weight:600;color:#0891b2;margin-bottom:6px}
.sbox p{font-size:13px;color:#0e7490;line-height:1.6}
.next-page{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#ecfeff;border:1px solid #a5f3fc;border-radius:10px;margin-top:4px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#0891b2}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#0891b2;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#0e7490}
.sbox p{font-size:13px;color:#0e7490;line-height:1.6}
a{color:#0891b2}
</style>
</head>
<body>
<div class="wrap">
  <div class="pg-header">
    <div><div class="pg-title">Prática guiada — Condições e Decisões</div><div class="pg-meta">Siga os passos no Colab. Marque cada um quando terminar.</div></div>
    <span class="pg-time">60 min disponíveis</span>
  </div>
  <div class="prog-row"><div class="pb"><div class="pf" id="pf"></div></div><div class="pt" id="pt">0 / 6</div></div>
  <div id="steps"></div>
  <div class="sbox" id="sbox">
    <h3>🔀 Condições dominadas!</h3>
    <p>if, elif, else e operadores lógicos prontos.<br>Hora do desafio autônomo!</p>
  </div>
  <div class="next-page" id="next-page" style="display:none">
    <div><div class="next-page-label">Prática concluída</div><div class="next-page-title">🏆 Desafio Autônomo — Condições e Decisões</div></div>
    <a class="next-page-btn" href="a02_desafio.html">Abrir Desafio →</a>
  </div>
</div>
<script>
const STEPS=[
{title:'Primeiro if e else — par ou ímpar',time:'8 min',
instrs:['Crie uma nova célula no Colab e declare a variável <code>numero = 7</code>','Use o operador <code>%</code> (resto da divisão) para verificar se o número é par: <code>numero % 2 == 0</code>','Escreva um if/else que imprime "Par" ou "Ímpar" conforme o resultado','Teste com pelo menos 3 valores diferentes (trocando o valor da variável)'],
code:`<span class="p">numero</span> = <span class="v">7</span>\n\n<span class="k">if</span> <span class="p">numero</span> % <span class="v">2</span> == <span class="v">0</span>:\n    <span class="fn">print</span>(<span class="s">f"{numero} é par"</span>)\n<span class="k">else</span>:\n    <span class="fn">print</span>(<span class="s">f"{numero} é ímpar"</span>)`,
tip:'<strong>Operador %:</strong> retorna o resto da divisão. 7 % 2 = 1, então 7 é ímpar. 8 % 2 = 0, então 8 é par. Esse teste é um dos mais usados em programação.'},
{title:'Classificador de notas com elif',time:'10 min',
instrs:['Use <code>input()</code> para pedir a nota ao usuário e converta com <code>float()</code>','Escreva um if com pelo menos 4 faixas usando elif: A (>=9), B (>=7), C (>=5), e Reprovado','Adicione uma verificação extra: se a nota for menor que 0 ou maior que 10, exiba "Nota inválida"','Teste com os valores: 10, 8, 6, 3, -1 e 11'],
code:`<span class="p">nota</span> = <span class="fn">float</span>(<span class="fn">input</span>(<span class="s">"Sua nota (0-10): "</span>))\n\n<span class="k">if</span> <span class="p">nota</span> < <span class="v">0</span> <span class="k">or</span> <span class="p">nota</span> > <span class="v">10</span>:\n    <span class="fn">print</span>(<span class="s">"Nota inválida!"</span>)\n<span class="k">elif</span> <span class="p">nota</span> >= <span class="v">9</span>:\n    <span class="fn">print</span>(<span class="s">"Conceito A"</span>)\n<span class="k">elif</span> <span class="p">nota</span> >= <span class="v">7</span>:\n    <span class="fn">print</span>(<span class="s">"Conceito B"</span>)\n<span class="k">elif</span> <span class="p">nota</span> >= <span class="v">5</span>:\n    <span class="fn">print</span>(<span class="s">"Conceito C"</span>)\n<span class="k">else</span>:\n    <span class="fn">print</span>(<span class="s">"Reprovado"</span>)`,
tip:'<strong>A ordem dos elif importa!</strong> Python para no primeiro True. Se você colocar >= 5 antes de >= 9, um aluno com 10 vai receber "Conceito C". Sempre comece pela condição mais restritiva.'},
{title:'Operadores lógicos — and e or',time:'8 min',
instrs:['Declare duas variáveis: <code>idade = 17</code> e <code>tem_autorizacao = True</code>','Use <code>and</code> para verificar se pode entrar na festa (>= 18 AND tem autorização)','Use <code>or</code> para verificar se ganha desconto (estudante OR idoso >= 60)','Experimente trocar os valores e observar como and e or se comportam diferente'],
code:`<span class="p">idade</span>           = <span class="v">17</span>\n<span class="p">tem_autorizacao</span> = <span class="v">True</span>\n\n<span class="k">if</span> <span class="p">idade</span> >= <span class="v">18</span> <span class="k">and</span> <span class="p">tem_autorizacao</span>:\n    <span class="fn">print</span>(<span class="s">"Entrada liberada!"</span>)\n<span class="k">else</span>:\n    <span class="fn">print</span>(<span class="s">"Entrada negada."</span>)\n\n<span class="p">estudante</span> = <span class="v">True</span>\n<span class="p">idoso</span>     = <span class="v">False</span>\n\n<span class="k">if</span> <span class="p">estudante</span> <span class="k">or</span> <span class="p">idoso</span>:\n    <span class="fn">print</span>(<span class="s">"Desconto aplicado!"</span>)`,
tip:'<strong>and vs or:</strong> com and, um False já derruba tudo. Com or, um True já garante tudo. Pense: "preciso que TUDO seja verdade?" → and. "Basta UMA coisa ser verdade?" → or.'},
{title:'Verificador de senha com not',time:'8 min',
instrs:['Crie uma variável <code>senha_correta = "python123"</code>','Use <code>input()</code> para pedir a senha ao usuário','Use <code>not</code> para verificar se a senha está errada e exibir mensagem de erro','Adicione um segundo if para verificar se o usuário é admin (senha = "admin2026")'],
code:`<span class="p">senha_correta</span> = <span class="s">"python123"</span>\n<span class="p">senha</span> = <span class="fn">input</span>(<span class="s">"Digite a senha: "</span>)\n\n<span class="k">if</span> <span class="k">not</span> (<span class="p">senha</span> == <span class="p">senha_correta</span>):\n    <span class="fn">print</span>(<span class="s">"Senha incorreta!"</span>)\n<span class="k">else</span>:\n    <span class="fn">print</span>(<span class="s">"Acesso liberado!"</span>)\n\n<span class="c"># Equivalente sem not:</span>\n<span class="k">if</span> <span class="p">senha</span> != <span class="p">senha_correta</span>:\n    <span class="fn">print</span>(<span class="s">"Versão com != — mesmo resultado"</span>)`,
tip:'<strong>not (x == y) é o mesmo que x != y.</strong> O not é mais útil com variáveis booleanas: <code>if not logado:</code> é mais legível que <code>if logado == False:</code>.'},
{title:'Calculadora de IMC completa',time:'10 min',
instrs:['Use <code>input()</code> e <code>float()</code> para ler peso e altura','Calcule o IMC: <code>imc = peso / altura ** 2</code>','Classifique em 4 faixas: Abaixo do peso (&lt;18.5), Normal (&lt;25), Sobrepeso (&lt;30), Obesidade','Exiba o IMC formatado com 1 casa decimal e a classificação em uma f-string'],
code:`<span class="p">peso</span>   = <span class="fn">float</span>(<span class="fn">input</span>(<span class="s">"Peso (kg): "</span>))\n<span class="p">altura</span> = <span class="fn">float</span>(<span class="fn">input</span>(<span class="s">"Altura (m): "</span>))\n<span class="p">imc</span>    = <span class="p">peso</span> / <span class="p">altura</span> ** <span class="v">2</span>\n\n<span class="k">if</span> <span class="p">imc</span> < <span class="v">18.5</span>:\n    <span class="p">classe</span> = <span class="s">"Abaixo do peso"</span>\n<span class="k">elif</span> <span class="p">imc</span> < <span class="v">25</span>:\n    <span class="p">classe</span> = <span class="s">"Peso normal"</span>\n<span class="k">elif</span> <span class="p">imc</span> < <span class="v">30</span>:\n    <span class="p">classe</span> = <span class="s">"Sobrepeso"</span>\n<span class="k">else</span>:\n    <span class="p">classe</span> = <span class="s">"Obesidade"</span>\n\n<span class="fn">print</span>(<span class="s">f"IMC: {imc:.1f} — {classe}"</span>)`,
tip:'<strong>Guardar o resultado em variável antes de imprimir</strong> é uma boa prática. Em vez de um print dentro de cada elif, guardamos em <code>classe</code> e imprimimos uma vez. Código mais limpo e fácil de modificar.'},
{title:'Mini desafio: caixa registradora com desconto',time:'14 min',
instrs:['Peça o valor total da compra com <code>input()</code> e converta para float','Se o total for maior que R$100, aplique 15% de desconto','Se o total for maior que R$50 mas menor ou igual a R$100, aplique 10% de desconto','Exiba o valor original, o desconto em reais e o valor final com 2 casas decimais'],
code:`<span class="p">total</span> = <span class="fn">float</span>(<span class="fn">input</span>(<span class="s">"Valor da compra: R$ "</span>))\n\n<span class="k">if</span> <span class="p">total</span> > <span class="v">100</span>:\n    <span class="p">desconto</span> = <span class="p">total</span> * <span class="v">0.15</span>\n<span class="k">elif</span> <span class="p">total</span> > <span class="v">50</span>:\n    <span class="p">desconto</span> = <span class="p">total</span> * <span class="v">0.10</span>\n<span class="k">else</span>:\n    <span class="p">desconto</span> = <span class="v">0</span>\n\n<span class="p">final</span> = <span class="p">total</span> - <span class="p">desconto</span>\n<span class="fn">print</span>(<span class="s">f"Original:  R$ {total:.2f}"</span>)\n<span class="fn">print</span>(<span class="s">f"Desconto:  R$ {desconto:.2f}"</span>)\n<span class="fn">print</span>(<span class="s">f"Total:     R$ {final:.2f}"</span>)`,
tip:'<strong>:.2f</strong> formata o número com 2 casas decimais — padrão para valores monetários. R$ 120.00 fica correto. Sem isso, você pode ver coisas como 119.99999999.'}
];
let done=new Set();
function build(){
  const list=document.getElementById('steps');STEPS.forEach((s,i)=>{
    const card=document.createElement('div');card.className='sc'+(i===0?' open-c':'');card.id='sc-'+i;
    card.innerHTML=`<div class="sh" onclick="tog(${i})"><div class="chk" id="chk-${i}" onclick="event.stopPropagation();mk(${i})"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="si"><div class="sn2">Passo ${i+1} de ${STEPS.length}</div><div class="st">${s.title}</div><div class="stm">${s.time}</div></div><span class="cv">${i===0?'▲':'▼'}</span></div><div class="sb"><div class="sbi"><div class="il">${s.instrs.map((t,j)=>`<div class="ii"><div class="in">${j+1}</div><span>${t}</span></div>`).join('')}</div>${s.code?`<div class="cb2">${s.code}</div>`:''}<div class="tip">${s.tip}</div><button class="mb" id="mb-${i}" onclick="mk(${i})"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Marcar como concluído</button></div></div>`;
    list.appendChild(card);
  });
}
function tog(i){const c=document.getElementById('sc-'+i);const o=c.classList.contains('open-c');document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').textContent='▼';});if(!o){c.classList.add('open-c');c.querySelector('.cv').textContent='▲';}}
function mk(i){if(done.has(i))return;done.add(i);document.getElementById('chk-'+i).classList.add('done');document.getElementById('sc-'+i).classList.add('done-c');const mb=document.getElementById('mb-'+i);mb.classList.add('done-btn');mb.innerHTML='<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Concluído!';upd();if(i<STEPS.length-1){document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').textContent='▼';});const nx=document.getElementById('sc-'+(i+1));nx.classList.add('open-c');nx.querySelector('.cv').textContent='▲';setTimeout(()=>nx.scrollIntoView({behavior:'smooth',block:'nearest'}),100);}if(done.size===STEPS.length){document.getElementById('sbox').classList.add('show');document.getElementById('next-page').style.display='flex';setTimeout(()=>document.getElementById('next-page').scrollIntoView({behavior:'smooth',block:'nearest'}),300);}}
function upd(){document.getElementById('pf').style.width=Math.round((done.size/STEPS.length)*100)+'%';document.getElementById('pt').textContent=done.size+' / '+STEPS.length;}
build();upd();
</script>
</body>
</html>
