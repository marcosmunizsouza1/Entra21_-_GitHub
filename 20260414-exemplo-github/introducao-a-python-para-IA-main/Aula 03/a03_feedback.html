<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback — Repetição com for e while · Aula 03</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f5f3ff;min-height:100vh;padding:22px}
.wrap{max-width:1020px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.ttitle{font-size:17px;font-weight:600}.tmeta{font-size:12px;color:#64748b;margin-top:1px}
.ttchip{font-size:13px;font-weight:600;padding:5px 14px;border-radius:20px;background:#ede9fe;border:1px solid #c4b5fd;color:#7c3aed;font-family:'Courier New',monospace;transition:all .3s}
.ttchip.warn{color:#d97706;background:#fffbeb;border-color:#fcd34d}
.ttchip.danger{color:#dc2626;background:#fef2f2;border-color:#fca5a5}
.ttbtn{font-size:12px;padding:6px 15px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#1e293b;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.ttbtn:hover{background:#f1f5f9}.ttbtn.act{background:#7c3aed;color:#fff;border-color:#7c3aed}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px;text-align:center}
.sn{font-size:24px;font-weight:500;color:#1e293b}.sl{font-size:11px;color:#64748b;margin-top:2px}
.fb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px}
.acard{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff;transition:all .2s}
.acard.pres{border:2px solid #7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.acard.done2{border-color:#86efac}
.at{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid #f1f5f9}
.av{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.an{font-size:13px;font-weight:600;line-height:1.2}.as{font-size:11px;color:#94a3b8;margin-top:1px}
.ab{padding:10px 13px}
.nota-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:5px}
.stars{display:flex;gap:3px;margin-bottom:8px}
.star{font-size:18px;cursor:pointer;color:#e2e8f0;user-select:none}
.star.on{color:#f59e0b}
.chks{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.chk2{display:flex;align-items:center;gap:6px;font-size:11px;color:#64748b}
.mc{width:14px;height:14px;border-radius:3px;border:1.5px solid #cbd5e1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.mc.on{background:#22c55e;border-color:#22c55e}
.mc svg{display:none}.mc.on svg{display:block}
.note{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;font-size:11px;font-family:inherit;color:#1e293b;background:#fff;resize:none;outline:none}
.note:focus{border-color:#7c3aed}
.acts{display:flex;gap:5px;margin-top:8px}
.act{flex:1;font-size:11px;padding:5px 4px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b;cursor:pointer;font-family:inherit;text-align:center;transition:all .12s}
.act:hover{background:#f5f3ff;color:#7c3aed;border-color:#c4b5fd}
.act.pon{background:#f5f3ff;color:#7c3aed;border-color:#7c3aed}
.act.don{background:#f0fdf4;color:#15803d;border-color:#86efac}
.col{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff}
.col-h{padding:11px 17px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:13px;font-weight:600;color:#475569;display:flex;align-items:center;justify-content:space-between}
.col-h span{font-size:11px;font-weight:400;color:#94a3b8}
.col-b{padding:13px 17px;display:flex;flex-direction:column;gap:7px}
.pto{border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:9px}
.pto:hover{border-color:#ddd6fe;background:#f5f3ff}.pto.used{border-color:#ddd6fe;background:#ede9fe}
.pto-ic{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.pto-tx{font-size:12px;color:#475569;line-height:1.5;flex:1}.pto.used .pto-tx{color:#2e1065}
.pto-tg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:9px;background:#f1f5f9;color:#64748b;white-space:nowrap;flex-shrink:0}
.pto.used .pto-tg{background:#ede9fe;color:#7c3aed}
.add-area{display:flex;gap:7px;padding:11px 17px;border-top:1px solid #e2e8f0}
.add-area input{flex:1;border:1px solid #e2e8f0;border-radius:6px;padding:6px 10px;font-size:12px;font-family:inherit;color:#1e293b;background:#fff;outline:none}
.add-area input:focus{border-color:#7c3aed}
.add-area button{font-size:12px;padding:6px 15px;border-radius:6px;border:1px solid #ddd6fe;background:#ede9fe;color:#6d28d9;cursor:pointer;font-family:inherit;font-weight:500}
.next-page{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#7c3aed}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#7c3aed;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#6d28d9}
@media(max-width:580px){.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <div class="ttitle">Painel de apresentações — Aula 03</div>
      <div class="tmeta">Repetição com for e while · 45 minutos</div>
    </div>
    <span class="ttchip" id="tt-chip">45:00</span>
    <button class="ttbtn" id="tt-btn" onclick="startTimer()">Iniciar sessão</button>
    <button class="ttbtn" onclick="addAluno()">+ Aluno</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="sn" id="sf-total">0</div><div class="sl">Alunos</div></div>
    <div class="stat"><div class="sn" id="sf-pres">0</div><div class="sl">Apresentaram</div></div>
    <div class="stat"><div class="sn" id="sf-med">—</div><div class="sl">Nota média</div></div>
    <div class="stat"><div class="sn" id="sf-pontos">0</div><div class="sl">Pontos discutidos</div></div>
  </div>
  <div class="fb-grid" id="fb-grid"></div>
  <div class="col">
    <div class="col-h">Pontos de discussão coletiva <span>Clique para marcar como discutido</span></div>
    <div class="col-b" id="pto-list"></div>
    <div class="add-area">
      <input type="text" id="novo-pto" placeholder="Adicionar ponto de discussão..." onkeydown="if(event.key==='Enter')addPonto()">
      <button onclick="addPonto()">Adicionar</button>
    </div>
  </div>
  <div class="next-page">
    <div><div class="next-page-label">Próxima aula</div><div class="next-page-title">📦 Aula 04 — Listas, Tuplas e Dicionários</div></div>
    <a class="next-page-btn" href="a04_exposicao.html">Abrir Aula 04 →</a>
  </div>
</div>
<script>
const CORES=[{bg:'#ede9fe',txt:'#2e1065'},{bg:'#dcfce7',txt:'#14532d'},{bg:'#fef3c7',txt:'#78350f'},{bg:'#fce7f3',txt:'#831843'},{bg:'#dbeafe',txt:'#1e3a8a'},{bg:'#fee2e2',txt:'#7f1d1d'},{bg:'#f0fdf4',txt:'#14532d'},{bg:'#ecfeff',txt:'#164e63'}];
const CRITERIOS=['for percorrendo a lista','Acumulador correto','Melhor dia identificado','Contador meta coreto','Relatório formatado'];
const PONTOS_BASE=[
{t:'Qual é a diferença entre range(10) e range(1, 11)? Por que o fim é sempre exclusivo?',tag:'range'},
{t:'Por que o acumulador deve ser declarado FORA do laço? O que acontece se declarar dentro?',tag:'acumulador'},
{t:'Quando usar for e quando usar while? Qual regra prática vocês usariam?',tag:'for vs while'},
{t:'O que acontece se esquecer o incremento (n += 1) dentro de um while? Como identificar?',tag:'loop infinito'},
{t:'Qual a diferença entre break e continue? Em que situações cada um é mais útil?',tag:'break/continue'},
{t:'Preview da Aula 04: listas, tuplas e dicionários — estruturas para organizar dados!',tag:'próxima aula'},
];
let alunos=[
  {nome:'Ana Lima',iniciais:'AL',cor:0,nota:0,checks:new Array(5).fill(false),status:'pendente',obs:''},
  {nome:'Bruno Costa',iniciais:'BC',cor:1,nota:0,checks:new Array(5).fill(false),status:'pendente',obs:''},
  {nome:'Carla Dias',iniciais:'CD',cor:2,nota:0,checks:new Array(5).fill(false),status:'pendente',obs:''},
  {nome:'Diego Melo',iniciais:'DM',cor:3,nota:0,checks:new Array(5).fill(false),status:'pendente',obs:''},
  {nome:'Ester Nunes',iniciais:'EN',cor:4,nota:0,checks:new Array(5).fill(false),status:'pendente',obs:''},
  {nome:'Felipe Ramos',iniciais:'FR',cor:5,nota:0,checks:new Array(5).fill(false),status:'pendente',obs:''},
];
let pontos=PONTOS_BASE.map(p=>({...p,used:false}));
let tSec=45*60,tInt=null,ticking=false;
function initials(n){return n.trim().split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();}
function buildAlunos(){
  const g=document.getElementById('fb-grid');g.innerHTML='';
  alunos.forEach((a,ai)=>{
    const cor=CORES[a.cor%CORES.length];
    const stL={pendente:'Aguardando',apresentando:'Apresentando agora ▶',concluido:'Concluído ✓'}[a.status];
    const card=document.createElement('div');
    card.className='acard'+(a.status==='apresentando'?' pres':'')+(a.status==='concluido'?' done2':'');
    card.innerHTML=`<div class="at"><div class="av" style="background:${cor.bg};color:${cor.txt}">${a.iniciais}</div><div><div class="an">${a.nome}</div><div class="as">${stL}</div></div></div><div class="ab"><div class="nota-lbl">Avaliação</div><div class="stars">${[1,2,3,4,5].map(n=>`<span class="star${a.nota>=n?' on':''}" onclick="setStar(${ai},${n})">★</span>`).join('')}</div><div class="nota-lbl">Critérios</div><div class="chks">${CRITERIOS.map((c,ci)=>`<div class="chk2"><div class="mc${a.checks[ci]?' on':''}" onclick="togChk(${ai},${ci})"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1 4.5l2.5 2.5 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span>${c}</span></div>`).join('')}</div><textarea class="note" rows="2" placeholder="Feedback..." oninput="saveObs(${ai},this.value)">${a.obs}</textarea><div class="acts"><div class="act${a.status==='apresentando'?' pon':''}" onclick="setStatus(${ai},'apresentando')">▶ Apresentando</div><div class="act${a.status==='concluido'?' don':''}" onclick="setStatus(${ai},'concluido')">✓ Concluído</div></div></div>`;
    g.appendChild(card);
  });
  updateStats();
}
function setStar(ai,n){alunos[ai].nota=alunos[ai].nota===n?0:n;buildAlunos();}
function togChk(ai,ci){alunos[ai].checks[ci]=!alunos[ai].checks[ci];buildAlunos();}
function setStatus(ai,s){alunos[ai].status=alunos[ai].status===s?'pendente':s;buildAlunos();}
function saveObs(ai,v){alunos[ai].obs=v;}
function addAluno(){const n=prompt('Nome do aluno:');if(!n||!n.trim())return;alunos.push({nome:n.trim(),iniciais:initials(n),cor:alunos.length%CORES.length,nota:0,checks:new Array(5).fill(false),status:'pendente',obs:''});buildAlunos();}
function updateStats(){
  document.getElementById('sf-total').textContent=alunos.length;
  document.getElementById('sf-pres').textContent=alunos.filter(a=>a.status==='concluido').length;
  const rated=alunos.filter(a=>a.nota>0);
  document.getElementById('sf-med').textContent=rated.length?(rated.reduce((s,a)=>s+a.nota,0)/rated.length).toFixed(1)+'★':'—';
  document.getElementById('sf-pontos').textContent=pontos.filter(p=>p.used).length;
}
function buildPontos(){
  const el=document.getElementById('pto-list');el.innerHTML='';
  pontos.forEach((p,i)=>{
    const d=document.createElement('div');d.className='pto'+(p.used?' used':'');
    d.onclick=()=>{p.used=!p.used;buildPontos();updateStats();};
    d.innerHTML=`<div class="pto-ic">${p.used?'✅':'💬'}</div><div class="pto-tx">${p.t}</div><div class="pto-tg">${p.tag}</div>`;
    el.appendChild(d);
  });
}
function addPonto(){const inp=document.getElementById('novo-pto');const v=inp.value.trim();if(!v)return;pontos.push({t:v,tag:'custom',used:false});inp.value='';buildPontos();}
function startTimer(){
  const btn=document.getElementById('tt-btn');
  if(!ticking){
    ticking=true;btn.textContent='⏸ Pausar';btn.className='ttbtn act';
    tInt=setInterval(()=>{
      tSec--;const m=Math.floor(tSec/60),s=tSec%60;
      const chip=document.getElementById('tt-chip');
      chip.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
      chip.className='ttchip'+(tSec<=60?' danger':tSec<=300?' warn':'');
      if(tSec<=0){clearInterval(tInt);ticking=false;btn.textContent='Encerrado';btn.disabled=true;}
    },1000);
  }else{
    ticking=false;clearInterval(tInt);btn.textContent='Continuar';btn.className='ttbtn';
  }
}
buildAlunos();buildPontos();
</script>
</body>
</html>
