<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Condições e Decisões · Aula 02</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#0891b2;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#0891b2;transform:scale(1.4)}.dot.done{background:#67e8f9;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#0891b2;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #0891b2}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}
.hl{background:#ecfeff;border-left:3px solid #0891b2;padding:10px 13px;font-size:12.5px;color:#164e63;line-height:1.55;margin:10px 0}
.hl strong{color:#0e7490;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#0891b2;color:#fff;border-color:#0891b2}
.nb.pr:hover{background:#0e7490}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}
.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#67e8f9;background:#ecfeff}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#ecfeff;color:#0891b2;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.next-page{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#ecfeff;border:1px solid #a5f3fc;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#0891b2}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#0891b2;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#0e7490}
.fluxo{display:flex;flex-direction:column;align-items:center;gap:0;margin:12px 0}
.fluxo-box{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;color:#1e293b;text-align:center;min-width:200px}
.fluxo-box.cond{background:#ecfeff;border-color:#67e8f9;color:#0e7490}
.fluxo-box.sim{background:#f0fdf4;border-color:#86efac;color:#15803d}
.fluxo-box.nao{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.fluxo-seta{font-size:18px;color:#94a3b8;line-height:1;padding:3px 0}
.fluxo-bifurca{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;margin:3px 0}
.fluxo-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;text-align:center;margin-bottom:4px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 02</span>
      <div><div class="hdr-title">Condições e Decisões — if, elif, else · Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-wrap" id="slide-wrap"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="goNav(-1)" disabled>← Anterior</button>
    <span class="nc" id="counter">1 / 9</span>
    <button class="nb pr" id="btn-next" onclick="goNav(1)">Próximo →</button>
  </div>
</div>
<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">O programa aprende a tomar decisões</div><div class="ssub">Na Aula 01 o programa só seguia em frente — sem escolhas. Agora ele vai perguntar a si mesmo: "o que faço dependendo do valor?" Isso muda tudo.</div><div class="cards"><div class="card ac"><div class="ci">🚦</div><div class="ct">Decisões no cotidiano</div><div class="cb">Se a nota for maior que 5, aprovado. Senão, reprovado. Se a temperatura passar de 38, febre. Programas fazem isso o tempo todo.</div></div><div class="card ac"><div class="ci">🔀</div><div class="ct">if — a palavra-chave</div><div class="cb"><code>if</code> significa "se" em inglês. É a estrutura mais fundamental de qualquer linguagem de programação. Tudo que depende de uma condição usa <code>if</code>.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Pensem: quando vocês acordam, como decidem o que vestir? Quais condições verificam? Temperatura? Dia da semana?"</em></div></div><div class="card"><div class="ci">🎯</div><div class="ct">O que veremos hoje</div><div class="cb">if, elif, else, operadores de comparação (==, !=, &gt;, &lt;, &gt;=, &lt;=), operadores lógicos (and, or, not) e indentação obrigatória.</div></div></div>';},
function(){return '<div class="ey">Conceito central · 3 min</div><div class="stitle">O fluxo de decisão — o programa escolhe um caminho</div><div class="ssub">Sem <code>if</code>, o programa executa todas as linhas em ordem. Com <code>if</code>, ele verifica uma condição e escolhe qual bloco executar.</div><div class="fluxo"><div class="fluxo-box">Início do programa</div><div class="fluxo-seta">↓</div><div class="fluxo-box cond">Condição: nota &gt;= 5?</div><div class="fluxo-seta">↓</div><div class="fluxo-bifurca"><div><div class="fluxo-label">Sim (True)</div><div class="fluxo-box sim">print("Aprovado!")</div></div><div><div class="fluxo-label">Não (False)</div><div class="fluxo-box nao">print("Reprovado")</div></div></div><div class="fluxo-seta">↓</div><div class="fluxo-box">Continua o programa</div></div><div class="hl"><strong>Importante:</strong> apenas um dos dois blocos executa. Nunca os dois ao mesmo tempo. O Python avalia a condição, obtém True ou False, e segue o caminho correspondente.</div>';},
function(){return '<div class="ey">Sintaxe · 4 min</div><div class="stitle">if, elif, else — a estrutura completa</div><div class="ssub">O <code>if</code> testa a primeira condição. O <code>elif</code> testa outras (pode ter vários). O <code>else</code> captura tudo que sobrou. Apenas um bloco executa.</div><div class="cw"><div class="ch"><span>Python · if, elif, else</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">nota</span> = <span class="fn">float</span>(<span class="fn">input</span>(<span class="s">"Sua nota (0-10): "</span>))\n\n<span class="k">if</span> <span class="p">nota</span> >= <span class="v">9</span>:\n    <span class="fn">print</span>(<span class="s">"Conceito A — Excelente!"</span>)\n<span class="k">elif</span> <span class="p">nota</span> >= <span class="v">7</span>:\n    <span class="fn">print</span>(<span class="s">"Conceito B — Bom!"</span>)\n<span class="k">elif</span> <span class="p">nota</span> >= <span class="v">5</span>:\n    <span class="fn">print</span>(<span class="s">"Conceito C — Aprovado"</span>)\n<span class="k">else</span>:\n    <span class="fn">print</span>(<span class="s">"Reprovado — tente novamente"</span>)\n\n<span class="cm"># Só um bloco executa. Se nota = 8:</span>\n<span class="cm"># → o if falha (8 < 9)</span>\n<span class="cm"># → o primeiro elif passa (8 >= 7) → "Conceito B"</span>\n<span class="cm"># → os outros blocos são ignorados</span></pre></div><div class="hl"><strong>Os dois-pontos e a indentação são obrigatórios.</strong> O <code>:</code> no final do if/elif/else abre o bloco. A indentação (4 espaços ou Tab) define quais linhas pertencem a esse bloco. Python usa isso em vez de chaves {}.</div>';},
function(){return '<div class="ey">Indentação · 3 min</div><div class="stitle">Indentação — a regra mais importante do Python</div><div class="ssub">Em Python, o espaço antes do código não é opcional — ele define a estrutura do programa. É diferente de HTML e JavaScript.</div><div class="compare"><div class="cs"><div class="csh" style="background:#fef2f2;color:#991b1b">❌ IndentationError</div><div class="csb"><pre style="background:#fef2f2;color:#dc2626;padding:8px;font-size:11px;border-radius:4px">if nota >= 5:\nprint("Aprovado")  ← ERRO!\n# falta indentação</pre>Python não sabe que o print<br>pertence ao if. Erro fatal.</div></div><div class="cs"><div class="csh" style="background:#f0fdf4;color:#15803d">✅ Correto</div><div class="csb"><pre style="background:#f0fdf4;color:#15803d;padding:8px;font-size:11px;border-radius:4px">if nota >= 5:\n    print("Aprovado")\n# 4 espaços ou 1 Tab</pre>O print está "dentro" do if.<br>Python entende a hierarquia.</div></div></div><div class="cards"><div class="card ac"><div class="ci">⌨️</div><div class="ct">Use Tab ou 4 espaços</div><div class="cb">O Colab converte Tab em 4 espaços automaticamente. Nunca misture os dois no mesmo arquivo — causa erros difíceis de encontrar.</div></div><div class="card ac"><div class="ci">🔵</div><div class="ct">Blocos aninhados</div><div class="cb">Um if dentro de outro if precisa de indentação dupla. Cada nível de bloco adiciona 4 espaços.</div></div><div class="card"><div class="ci">👁️</div><div class="ct">Colab destaca</div><div class="cb">O Colab mostra a indentação com uma linha vertical fina. Use isso para verificar se a estrutura está correta.</div></div></div>';},
function(){return '<div class="ey">Operadores · 4 min</div><div class="stitle">Operadores de comparação — a condição do if</div><div class="ssub">A condição dentro do <code>if</code> é sempre uma expressão que resulta em <code>True</code> ou <code>False</code>. Os operadores de comparação fazem isso.</div><div class="cw"><div class="ch"><span>Python · Operadores de comparação</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">x</span> = <span class="v">10</span>\n\n<span class="fn">print</span>(<span class="p">x</span> == <span class="v">10</span>)   <span class="cm"># True  → igual a</span>\n<span class="fn">print</span>(<span class="p">x</span> != <span class="v">5</span>)    <span class="cm"># True  → diferente de</span>\n<span class="fn">print</span>(<span class="p">x</span> > <span class="v">8</span>)     <span class="cm"># True  → maior que</span>\n<span class="fn">print</span>(<span class="p">x</span> < <span class="v">8</span>)     <span class="cm"># False → menor que</span>\n<span class="fn">print</span>(<span class="p">x</span> >= <span class="v">10</span>)   <span class="cm"># True  → maior ou igual</span>\n<span class="fn">print</span>(<span class="p">x</span> <= <span class="v">9</span>)    <span class="cm"># False → menor ou igual</span>\n\n<span class="cm"># Comparar strings também funciona</span>\n<span class="p">cor</span> = <span class="s">"azul"</span>\n<span class="fn">print</span>(<span class="p">cor</span> == <span class="s">"azul"</span>)   <span class="cm"># True</span>\n<span class="fn">print</span>(<span class="p">cor</span> == <span class="s">"Azul"</span>)   <span class="cm"># False! maiúscula importa</span></pre></div><div class="hl"><strong>Não confunda = com ==.</strong> O <code>=</code> guarda um valor em uma variável. O <code>==</code> compara dois valores e retorna True ou False. Usar <code>=</code> dentro de um <code>if</code> causa erro.</div>';},
function(){return '<div class="ey">Lógica · 3 min</div><div class="stitle">and, or, not — combinando condições</div><div class="ssub">Às vezes uma única condição não é suficiente. Os operadores lógicos permitem combinar várias condições em uma só expressão.</div><div class="cw"><div class="ch"><span>Python · Operadores lógicos</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">idade</span> = <span class="v">20</span>\n<span class="p">tem_carteira</span> = <span class="v">True</span>\n\n<span class="cm"># and → as DUAS condições precisam ser True</span>\n<span class="k">if</span> <span class="p">idade</span> >= <span class="v">18</span> <span class="k">and</span> <span class="p">tem_carteira</span>:\n    <span class="fn">print</span>(<span class="s">"Pode dirigir"</span>)\n\n<span class="cm"># or → PELO MENOS UMA precisa ser True</span>\n<span class="p">dia</span> = <span class="s">"sábado"</span>\n<span class="k">if</span> <span class="p">dia</span> == <span class="s">"sábado"</span> <span class="k">or</span> <span class="p">dia</span> == <span class="s">"domingo"</span>:\n    <span class="fn">print</span>(<span class="s">"Fim de semana!"</span>)\n\n<span class="cm"># not → inverte o resultado</span>\n<span class="p">chovendo</span> = <span class="v">False</span>\n<span class="k">if</span> <span class="k">not</span> <span class="p">chovendo</span>:\n    <span class="fn">print</span>(<span class="s">"Pode sair sem guarda-chuva"</span>)</pre></div><div class="cards"><div class="card ac"><div class="ci">🔗</div><div class="ct">and — E lógico</div><div class="cb">Só True se <strong>todas</strong> as condições forem True. Um False já torna tudo False.</div></div><div class="card ac"><div class="ci">🔀</div><div class="ct">or — OU lógico</div><div class="cb">True se <strong>pelo menos uma</strong> condição for True. Só False se todas forem False.</div></div><div class="card ac"><div class="ci">🔄</div><div class="ct">not — inversão</div><div class="cb">Inverte o valor: <code>not True</code> = False, <code>not False</code> = True.</div></div></div>';},
function(){return '<div class="ey">Exemplo completo · 3 min</div><div class="stitle">Classificador de IMC — juntando tudo</div><div class="ssub">Vamos usar input(), float(), if, elif e else para criar um programa que classifica o IMC de uma pessoa em quatro faixas.</div><div class="cw"><div class="ch"><span>Python · Classificador de IMC completo</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="fn">print</span>(<span class="s">"=== Calculadora de IMC ==="</span>)\n\n<span class="p">peso</span>   = <span class="fn">float</span>(<span class="fn">input</span>(<span class="s">"Peso (kg): "</span>))\n<span class="p">altura</span> = <span class="fn">float</span>(<span class="fn">input</span>(<span class="s">"Altura (m): "</span>))\n<span class="p">imc</span>    = <span class="p">peso</span> / <span class="p">altura</span> ** <span class="v">2</span>\n\n<span class="fn">print</span>(<span class="s">f"Seu IMC: {imc:.1f}"</span>)\n\n<span class="k">if</span> <span class="p">imc</span> < <span class="v">18.5</span>:\n    <span class="p">resultado</span> = <span class="s">"Abaixo do peso"</span>\n<span class="k">elif</span> <span class="p">imc</span> < <span class="v">25</span>:\n    <span class="p">resultado</span> = <span class="s">"Peso normal"</span>\n<span class="k">elif</span> <span class="p">imc</span> < <span class="v">30</span>:\n    <span class="p">resultado</span> = <span class="s">"Sobrepeso"</span>\n<span class="k">else</span>:\n    <span class="p">resultado</span> = <span class="s">"Obesidade"</span>\n\n<span class="fn">print</span>(<span class="s">f"Classificação: {resultado}"</span>)</pre></div><div class="hl"><strong>Dica de legibilidade:</strong> em vez de imprimir dentro de cada elif, guardamos o resultado em uma variável e imprimimos uma vez só no final. O código fica mais limpo e fácil de manter.</div>';},
function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. Qual é a diferença entre <code>=</code> e <code>==</code> em Python?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>São a mesma coisa, apenas estilos diferentes</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>B</span><code>==</code> guarda valor, <code>=</code> compara</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>C</span><code>=</code> guarda valor em variável, <code>==</code> compara dois valores</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span><code>==</code> é usado apenas com números</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! O = atribui: <code>x = 10</code> guarda 10 em x. O == compara: <code>x == 10</code> retorna True ou False. Usar = dentro de um if causa SyntaxError.</div></div><div class="qb"><div class="qa">2. O que acontece se nenhuma condição do <code>if</code> e <code>elif</code> for verdadeira e não houver <code>else</code>?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>A</span>O programa dá erro</div><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>B</span>O bloco inteiro é simplesmente ignorado</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>C</span>O Python executa o último elif de qualquer forma</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span>O programa para de executar</div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! O else é opcional. Se nenhuma condição for True e não houver else, o Python simplesmente pula o bloco inteiro e continua o programa normalmente.</div></div>';},
function(){return '<div class="ey">Encerramento · 1 min</div><div class="stitle">Recapitulando</div><div class="ssub">O que aprendemos e o que faremos agora.</div><div class="rl"><div class="ri"><div class="rn">1</div><div class="rt"><strong>if testa uma condição.</strong> Se for True, executa o bloco. Senão, pula. Sempre termina com dois-pontos <code>:</code>.</div></div><div class="ri"><div class="rn">2</div><div class="rt"><strong>elif adiciona mais condições.</strong> Pode ter quantos quiser. Só um bloco executa — o primeiro cujo teste for True.</div></div><div class="ri"><div class="rn">3</div><div class="rt"><strong>else captura o resto.</strong> Executa quando nenhuma condição anterior foi True. É opcional.</div></div><div class="ri"><div class="rn">4</div><div class="rt"><strong>Indentação é obrigatória.</strong> 4 espaços ou Tab. O Python usa isso para saber quais linhas pertencem a cada bloco.</div></div><div class="ri"><div class="rn">5</div><div class="rt"><strong>and, or, not combinam condições.</strong> <code>and</code> exige todas True. <code>or</code> exige ao menos uma. <code>not</code> inverte o resultado.</div></div></div><div class="hl"><strong>Próximo passo:</strong> prática guiada no Colab — classificador de notas, verificador de senha e calculadora de IMC com todas as faixas.</div><div class=\"next-page\"><div><div class=\"next-page-label\">Próxima etapa</div><div class=\"next-page-title\">▶ Demo ao Vivo — Condições e Decisões</div></div><a class=\"next-page-btn\" href=\"a02_demo_ao_vivo.html\">Abrir Demo →</a></div>';}
];
function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=30*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Não exatamente — relembre os operadores e a estrutura do if.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
