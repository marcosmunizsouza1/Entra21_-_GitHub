<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Listas, Tuplas e Dicionários · Aula 04</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#059669;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#059669;transform:scale(1.4)}.dot.done{background:#6ee7b7;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#059669;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #059669}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}
.hl{background:#f0fdf4;border-left:3px solid #059669;padding:10px 13px;font-size:12.5px;color:#14532d;line-height:1.55;margin:10px 0}
.hl strong{color:#047857;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#059669;color:#fff;border-color:#059669}
.nb.pr:hover{background:#047857}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.compare{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:600px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}
.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#6ee7b7;background:#f0fdf4}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#dcfce7;color:#059669;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.next-page{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#059669}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#059669;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#047857}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 04</span>
      <div><div class="hdr-title">Listas, Tuplas e Dicionários · Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-wrap" id="slide-wrap"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="goNav(-1)" disabled>← Anterior</button>
    <span class="nc" id="counter">1 / 9</span>
    <button class="nb pr" id="btn-next" onclick="goNav(1)">Próximo →</button>
  </div>
</div>
<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">Estruturas de dados — organizando informação</div><div class="ssub">Até agora guardamos um valor por variável. E se precisarmos guardar 100 notas? 50 nomes? Precisamos de estruturas que agrupam múltiplos valores.</div><div class="cards"><div class="card ac"><div class="ci">📋</div><div class="ct">Lista</div><div class="cb">Sequência ordenada e mutável. O tipo mais versátil do Python. Aceita qualquer tipo de dado e pode crescer ou diminuir.</div></div><div class="card ac"><div class="ci">📌</div><div class="ct">Tupla</div><div class="cb">Sequência ordenada e imutável. Como uma lista que não pode ser alterada. Ideal para dados que não devem mudar.</div></div><div class="card ac"><div class="ci">📖</div><div class="ct">Dicionário</div><div class="cb">Pares de chave e valor. Acesso instantâneo por nome, não por posição. O mais poderoso dos três.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Uma lista telefônica guarda nome e número juntos. Como vocês fariam isso com variáveis simples para 100 contatos? Qual seria o problema?"</em></div></div></div>';},
function(){return '<div class="ey">Listas · 4 min</div><div class="stitle">Listas — coleções ordenadas e mutáveis</div><div class="ssub">A lista é a estrutura mais usada em Python. Você já usou nos laços da Aula 03 — agora vamos explorar todos os seus recursos.</div><div class="cw"><div class="ch"><span>Python · Criando e manipulando listas</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Criar lista</span>\n<span class="p">notas</span> = [<span class="v">7.5</span>, <span class="v">8.0</span>, <span class="v">6.5</span>, <span class="v">9.0</span>]\n<span class="p">nomes</span> = [<span class="s">"Ana"</span>, <span class="s">"Bruno"</span>, <span class="s">"Carla"</span>]\n<span class="p">mista</span> = [<span class="v">1</span>, <span class="s">"texto"</span>, <span class="v">True</span>, <span class="v">3.14</span>]  <span class="cm"># tipos mistos: ok!</span>\n\n<span class="cm"># Acessar por índice (começa em 0)</span>\n<span class="fn">print</span>(<span class="p">notas</span>[<span class="v">0</span>])    <span class="cm"># 7.5 — primeiro</span>\n<span class="fn">print</span>(<span class="p">notas</span>[-<span class="v">1</span>])   <span class="cm"># 9.0 — último</span>\n<span class="fn">print</span>(<span class="p">notas</span>[<span class="v">1</span>:<span class="v">3</span>])  <span class="cm"># [8.0, 6.5] — fatia</span>\n\n<span class="cm"># Modificar</span>\n<span class="p">notas</span>[<span class="v">2</span>] = <span class="v">7.0</span>           <span class="cm"># alterar elemento</span>\n<span class="p">notas</span>.<span class="fn">append</span>(<span class="v">8.5</span>)       <span class="cm"># adicionar no final</span>\n<span class="p">notas</span>.<span class="fn">remove</span>(<span class="v">7.5</span>)       <span class="cm"># remover por valor</span>\n<span class="fn">print</span>(<span class="fn">len</span>(<span class="p">notas</span>))        <span class="cm"># tamanho da lista</span></pre></div><div class="hl"><strong>Índice negativo:</strong> <code>lista[-1]</code> acessa o último elemento, <code>lista[-2]</code> o penúltimo. Muito mais elegante que <code>lista[len(lista)-1]</code>.</div>';},
function(){return '<div class="ey">Métodos de lista · 3 min</div><div class="stitle">Os métodos mais usados de lista</div><div class="ssub">Listas têm dezenas de métodos. Estes são os que você vai usar em 90% dos casos.</div><div class="cw"><div class="ch"><span>Python · Métodos essenciais de lista</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">frutas</span> = [<span class="s">"banana"</span>, <span class="s">"laranja"</span>, <span class="s">"uva"</span>]\n\n<span class="cm"># Adicionar</span>\n<span class="p">frutas</span>.<span class="fn">append</span>(<span class="s">"manga"</span>)      <span class="cm"># no final</span>\n<span class="p">frutas</span>.<span class="fn">insert</span>(<span class="v">1</span>, <span class="s">"maca"</span>)   <span class="cm"># em posição específica</span>\n\n<span class="cm"># Remover</span>\n<span class="p">frutas</span>.<span class="fn">remove</span>(<span class="s">"uva"</span>)        <span class="cm"># por valor</span>\n<span class="p">frutas</span>.<span class="fn">pop</span>()               <span class="cm"># remove o último</span>\n<span class="p">frutas</span>.<span class="fn">pop</span>(<span class="v">0</span>)              <span class="cm"># remove por índice</span>\n\n<span class="cm"># Consultar</span>\n<span class="fn">print</span>(<span class="s">"laranja"</span> <span class="k">in</span> <span class="p">frutas</span>)  <span class="cm"># True/False</span>\n<span class="fn">print</span>(<span class="p">frutas</span>.<span class="fn">count</span>(<span class="s">"banana"</span>)) <span class="cm"># quantas vezes aparece</span>\n<span class="fn">print</span>(<span class="p">frutas</span>.<span class="fn">index</span>(<span class="s">"manga"</span>)) <span class="cm"># posição do elemento</span>\n\n<span class="cm"># Ordenar e inverter</span>\n<span class="p">frutas</span>.<span class="fn">sort</span>()              <span class="cm"># ordena no lugar</span>\n<span class="p">frutas</span>.<span class="fn">reverse</span>()           <span class="cm"># inverte no lugar</span>\n<span class="fn">sorted</span>(<span class="p">frutas</span>)             <span class="cm"># retorna nova lista ordenada</span></pre></div>';},
function(){return '<div class="ey">Tuplas · 3 min</div><div class="stitle">Tuplas — listas que não mudam</div><div class="ssub">Tuplas são como listas, mas imutáveis: uma vez criadas, não podem ser alteradas. Use quando os dados não devem mudar — coordenadas, datas, configurações fixas.</div><div class="cw"><div class="ch"><span>Python · Tuplas na prática</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Criar tupla — parênteses (ou sem parênteses)</span>\n<span class="p">coordenada</span> = (<span class="v">-23.5</span>, <span class="v">-46.6</span>)   <span class="cm"># latitude, longitude</span>\n<span class="p">cores_rgb</span>  = (<span class="v">255</span>, <span class="v">128</span>, <span class="v">0</span>)      <span class="cm"># laranja</span>\n<span class="p">ponto</span>      = <span class="v">10</span>, <span class="v">20</span>             <span class="cm"># sem parênteses: também é tupla</span>\n\n<span class="cm"># Acessar — igual à lista</span>\n<span class="fn">print</span>(<span class="p">coordenada</span>[<span class="v">0</span>])   <span class="cm"># -23.5</span>\n<span class="fn">print</span>(<span class="fn">len</span>(<span class="p">cores_rgb</span>))  <span class="cm"># 3</span>\n\n<span class="cm"># Desempacotamento — muito útil!</span>\n<span class="p">lat</span>, <span class="p">lon</span> = <span class="p">coordenada</span>\n<span class="fn">print</span>(<span class="s">f"Lat: {lat}, Lon: {lon}"</span>)\n\n<span class="p">r</span>, <span class="p">g</span>, <span class="p">b</span> = <span class="p">cores_rgb</span>\n<span class="fn">print</span>(<span class="s">f"R={r} G={g} B={b}"</span>)\n\n<span class="cm"># Tupla é imutável — isso causa erro:</span>\n<span class="cm"># coordenada[0] = 0  → TypeError!</span></pre></div><div class="hl"><strong>Desempacotamento</strong> é um dos recursos mais elegantes do Python. <code>a, b = (1, 2)</code> atribui 1 a <code>a</code> e 2 a <code>b</code> em uma só linha. Funciona com listas também.</div>';},
function(){return '<div class="ey">Dicionários · 4 min</div><div class="stitle">Dicionários — dados acessados por nome</div><div class="ssub">Dicionários guardam pares chave-valor. Em vez de buscar pelo índice (0, 1, 2...), você busca pelo nome. É mais legível e muito mais rápido para grandes volumes de dados.</div><div class="cw"><div class="ch"><span>Python · Dicionários na prática</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Criar dicionário</span>\n<span class="p">aluno</span> = {\n    <span class="s">"nome"</span>    : <span class="s">"Carlos"</span>,\n    <span class="s">"idade"</span>   : <span class="v">22</span>,\n    <span class="s">"nota"</span>    : <span class="v">8.5</span>,\n    <span class="s">"aprovado"</span>: <span class="v">True</span>\n}\n\n<span class="cm"># Acessar por chave</span>\n<span class="fn">print</span>(<span class="p">aluno</span>[<span class="s">"nome"</span>])      <span class="cm"># Carlos</span>\n<span class="fn">print</span>(<span class="p">aluno</span>[<span class="s">"nota"</span>])      <span class="cm"># 8.5</span>\n\n<span class="cm"># Adicionar e alterar</span>\n<span class="p">aluno</span>[<span class="s">"turma"</span>] = <span class="s">"A2"</span>     <span class="cm"># nova chave</span>\n<span class="p">aluno</span>[<span class="s">"nota"</span>]  = <span class="v">9.0</span>     <span class="cm"># alterar existente</span>\n\n<span class="cm"># Verificar se chave existe</span>\n<span class="fn">print</span>(<span class="s">"email"</span> <span class="k">in</span> <span class="p">aluno</span>)   <span class="cm"># False</span>\n\n<span class="cm"># .get() — sem erro se chave não existir</span>\n<span class="fn">print</span>(<span class="p">aluno</span>.<span class="fn">get</span>(<span class="s">"email"</span>, <span class="s">"sem email"</span>))</pre></div>';},
function(){return '<div class="ey">Métodos de dicionário · 3 min</div><div class="stitle">Iterando e manipulando dicionários</div><div class="ssub">Três métodos essenciais para trabalhar com dicionários: <code>.keys()</code>, <code>.values()</code> e <code>.items()</code>. São usados constantemente para percorrer dados.</div><div class="cw"><div class="ch"><span>Python · Iterando dicionários</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">produto</span> = {\n    <span class="s">"nome"</span>    : <span class="s">"Notebook"</span>,\n    <span class="s">"preco"</span>   : <span class="v">3500.00</span>,\n    <span class="s">"estoque"</span> : <span class="v">12</span>,\n    <span class="s">"ativo"</span>   : <span class="v">True</span>\n}\n\n<span class="cm"># Percorrer chaves</span>\n<span class="k">for</span> <span class="p">chave</span> <span class="k">in</span> <span class="p">produto</span>.<span class="fn">keys</span>():\n    <span class="fn">print</span>(<span class="p">chave</span>)\n\n<span class="cm"># Percorrer valores</span>\n<span class="k">for</span> <span class="p">valor</span> <span class="k">in</span> <span class="p">produto</span>.<span class="fn">values</span>():\n    <span class="fn">print</span>(<span class="p">valor</span>)\n\n<span class="cm"># Percorrer pares — o mais usado!</span>\n<span class="k">for</span> <span class="p">chave</span>, <span class="p">valor</span> <span class="k">in</span> <span class="p">produto</span>.<span class="fn">items</span>():\n    <span class="fn">print</span>(<span class="s">f"  {chave}: {valor}"</span>)\n\n<span class="cm"># Remover chave</span>\n<span class="k">del</span> <span class="p">produto</span>[<span class="s">"ativo"</span>]\n<span class="fn">print</span>(<span class="fn">len</span>(<span class="p">produto</span>))  <span class="cm"># 3</span></pre></div><div class="hl"><strong>.get(chave, padrao)</strong> é mais seguro que <code>dict[chave]</code>. Se a chave não existir, retorna o padrão em vez de causar KeyError. Use sempre quando a chave pode estar ausente.</div>';},
function(){return '<div class="ey">Comparativo · 3 min</div><div class="stitle">Lista vs Tupla vs Dicionário — quando usar cada um</div><div class="ssub">Escolher a estrutura errada não quebra o código, mas torna-o mais difícil de ler e menos eficiente. A regra é simples.</div><div class="compare"><div class="cs"><div class="csh" style="background:#dcfce7;color:#14532d">📋 Lista</div><div class="csb">Sequência ordenada que pode crescer.<br><br>✓ Notas de alunos<br>✓ Histórico de compras<br>✓ Fila de tarefas<br>✓ Quando a ordem importa<br><br><code>notas = [7.5, 8.0, 9.0]</code></div></div><div class="cs"><div class="csh" style="background:#fef9c3;color:#713f12">📌 Tupla</div><div class="csb">Sequência fixa e imutável.<br><br>✓ Coordenadas (lat, lon)<br>✓ Data de nascimento<br>✓ Retorno de função<br>✓ Quando dados nao mudam<br><br><code>ponto = (10, 20)</code></div></div><div class="cs"><div class="csh" style="background:#dbeafe;color:#1e3a8a">📖 Dicionário</div><div class="csb">Acesso por nome, nao por posição.<br><br>✓ Perfil de usuário<br>✓ Configurações<br>✓ Resultado de API<br>✓ Quando nome importa mais que ordem<br><br><code>user = {"nome": "Ana"}</code></div></div></div><div class="hl"><strong>Regra prática:</strong> tem ordem e pode mudar? Lista. Tem ordem e nao muda? Tupla. Acessa pelo nome? Dicionário.</div>';},
function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. Qual estrutura usar para guardar o nome, email e telefone de um contato?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>Lista, pois tem 3 elementos</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>B</span>Tupla, pois os dados sao fixos</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>C</span>Dicionário, pois cada dado tem um nome</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span>Variáveis separadas</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! Dicionário é ideal para dados com nomes diferentes. contato = {"nome": "Ana", "email": "...", "tel": "..."} é muito mais legível que uma lista com índices 0, 1, 2.</div></div><div class="qb"><div class="qa">2. O que acontece ao executar: <code>t = (1, 2, 3)</code> seguido de <code>t[0] = 9</code>?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>A</span>t passa a ser (9, 2, 3)</div><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>B</span>TypeError — tupla nao pode ser modificada</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>C</span>Python ignora silenciosamente</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span>SyntaxError</div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! Tuplas sao imutáveis. Qualquer tentativa de alterar um elemento causa TypeError: object does not support item assignment.</div></div>';},
function(){return '<div class="ey">Encerramento · 1 min</div><div class="stitle">Recapitulando</div><div class="ssub">O que aprendemos e o que faremos agora.</div><div class="rl"><div class="ri"><div class="rn">1</div><div class="rt"><strong>Lista</strong> é sequência ordenada e mutável. Acesse por índice, use append/remove para modificar e len() para o tamanho.</div></div><div class="ri"><div class="rn">2</div><div class="rt"><strong>Índice negativo</strong> acessa do final: <code>lista[-1]</code> é o último. Fatiamento <code>lista[1:3]</code> retorna do índice 1 ao 2.</div></div><div class="ri"><div class="rn">3</div><div class="rt"><strong>Tupla</strong> é imutável. Use para dados que nao devem mudar. Desempacotamento <code>a, b = (1, 2)</code> é elegante e muito usado.</div></div><div class="ri"><div class="rn">4</div><div class="rt"><strong>Dicionário</strong> acessa por chave, nao por índice. Use .get() para evitar KeyError. Itere com .items() para pares chave-valor.</div></div><div class="ri"><div class="rn">5</div><div class="rt"><strong>Escolha certa:</strong> ordem mutável → lista. Dados fixos → tupla. Acesso por nome → dicionário.</div></div></div><div class="next-page"><div><div class="next-page-label">Próxima etapa</div><div class="next-page-title">▶ Demo ao Vivo — Listas, Tuplas e Dicionários</div></div><a class="next-page-btn" href="a04_demo_ao_vivo.html">Abrir Demo →</a></div>';}
];
function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=30*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Nao exatamente — relembre as características de cada estrutura.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
