<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Pandas: Lendo e Explorando Dados · Aula 07</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#0d9488;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#0d9488;transform:scale(1.4)}.dot.done{background:#5eead4;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#0d9488;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #0d9488}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}.fn{color:#fbbf24}
.hl{background:#f0fdfa;border-left:3px solid #0d9488;padding:10px 13px;font-size:12.5px;color:#134e4a;line-height:1.55;margin:10px 0}
.hl strong{color:#0f766e;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#0d9488;color:#fff;border-color:#0d9488}
.nb.pr:hover{background:#0f766e}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}
.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.7}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.tbl th{background:#f0fdfa;color:#0d9488;font-weight:600;padding:7px 11px;text-align:left;border-bottom:2px solid #99f6e4}
.tbl td{padding:6px 11px;border-bottom:1px solid #f1f5f9;color:#475569}
.tbl tr:hover td{background:#f8fafc}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#5eead4;background:#f0fdfa}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#ccfbf1;color:#0d9488;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.next-page{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 16px;background:#f0fdfa;border:1px solid #99f6e4;border-radius:10px}
.next-page-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#0d9488}
.next-page-title{font-size:13px;font-weight:600;color:#1e293b;margin-top:2px}
.next-page-btn{background:#0d9488;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-block}
.next-page-btn:hover{background:#0f766e}
</style>
</head>

<div id="app">
  <div class="hdr">

      <span class="badge">Aula 07</span>

<script>
var cur=0,timerStarted=false,timerInterval=null;
var SLIDES=[
function(){return '<div class="ey">Abertura · 3 min</div><div class="stitle">Pandas — de arrays a tabelas com nome</div><div class="ssub">NumPy trabalha com arrays de números. O mundo real usa tabelas: linhas com observações, colunas com variáveis, nomes em vez de índices. Pandas preenche essa lacuna.</div><div class="cards"><div class="card ac"><div class="ci">🐼</div><div class="ct">O que é Pandas</div><div class="cb">Biblioteca para análise de dados tabulares. Construída sobre NumPy — as operações vetorizadas continuam por baixo, mas agora com nomes e índices.</div></div><div class="card ac"><div class="ci">📊</div><div class="ct">DataFrame</div><div class="cb">A estrutura central do Pandas. Uma tabela 2D com colunas nomeadas e índice de linhas. Pense em uma planilha Excel acessível via código.</div></div><div class="card ac"><div class="ci">📋</div><div class="ct">Series</div><div class="cb">Uma coluna única com índice. O DataFrame é uma coleção de Series. Entender Series é entender como as colunas funcionam.</div></div><div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Se vocês recebessem um CSV com 10.000 linhas de vendas, como fariam para descobrir qual produto vendeu mais? Pensem nos passos."</em></div></div></div>';},
function(){return '<div class="ey">Lendo dados · 4 min</div><div class="stitle">Carregando dados de CSV e Excel</div><div class="ssub">A primeira coisa em qualquer projeto de dados é carregar o arquivo. Pandas tem funções para CSV, Excel, JSON, SQL e muito mais — todas retornam um DataFrame.</div><div class="cw"><div class="ch"><span>Python · Lendo diferentes formatos</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="k">import</span> <span class="p">pandas</span> <span class="k">as</span> <span class="p">pd</span>\n\n<span class="cm"># CSV — o formato mais comum</span>\n<span class="p">df</span> = <span class="p">pd</span>.<span class="fn">read_csv</span>(<span class="s">"vendas.csv"</span>)\n\n<span class="cm"># Excel</span>\n<span class="p">df</span> = <span class="p">pd</span>.<span class="fn">read_excel</span>(<span class="s">"relatorio.xlsx"</span>)\n\n<span class="cm"># Criar DataFrame a partir de dicionário</span>\n<span class="p">df</span> = <span class="p">pd</span>.<span class="fn">DataFrame</span>({\n    <span class="s">"nome"</span>  : [<span class="s">"Ana"</span>, <span class="s">"Bruno"</span>, <span class="s">"Carla"</span>],\n    <span class="s">"nota"</span>  : [<span class="v">8.5</span>, <span class="v">4.0</span>, <span class="v">9.0</span>],\n    <span class="s">"turma"</span> : [<span class="s">"A"</span>, <span class="s">"A"</span>, <span class="s">"B"</span>]\n})\n\n<span class="cm"># Ler CSV direto da internet (URL)</span>\n<span class="p">df</span> = <span class="p">pd</span>.<span class="fn">read_csv</span>(<span class="s">"https://..."</span>)</pre></div><div class="hl"><strong>pd.read_csv()</strong> tem dezenas de parâmetros úteis: <code>sep=</code> para separador diferente de vírgula, <code>encoding=</code> para caracteres especiais, <code>nrows=</code> para carregar só as primeiras N linhas — útil para explorar arquivos grandes.</div>';},
function(){return '<div class="ey">Primeiros passos · 4 min</div><div class="stitle">head, tail, shape e info — conhecendo o DataFrame</div><div class="ssub">Ao carregar qualquer dataset, o primeiro passo é sempre o mesmo: entender o que você tem. Quatro funções cobrem 90% dessa exploração inicial.</div><div class="cw"><div class="ch"><span>Python · Exploração inicial</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Ver as primeiras/últimas linhas</span>\n<span class="p">df</span>.<span class="fn">head</span>()       <span class="cm"># 5 primeiras (padrão)</span>\n<span class="p">df</span>.<span class="fn">head</span>(<span class="v">10</span>)     <span class="cm"># 10 primeiras</span>\n<span class="p">df</span>.<span class="fn">tail</span>(<span class="v">3</span>)      <span class="cm"># 3 últimas</span>\n\n<span class="cm"># Dimensões</span>\n<span class="fn">print</span>(<span class="p">df</span>.<span class="fn">shape</span>)  <span class="cm"># (linhas, colunas)</span>\n\n<span class="cm"># Resumo: tipos, nulos, memória</span>\n<span class="p">df</span>.<span class="fn">info</span>()\n\n<span class="cm"># Nomes das colunas</span>\n<span class="fn">print</span>(<span class="p">df</span>.<span class="fn">columns</span>.<span class="fn">tolist</span>())\n\n<span class="cm"># Tipos de cada coluna</span>\n<span class="fn">print</span>(<span class="p">df</span>.<span class="fn">dtypes</span>)\n\n<span class="cm"># Quantos valores nulos por coluna</span>\n<span class="fn">print</span>(<span class="p">df</span>.<span class="fn">isnull</span>().<span class="fn">sum</span>())</pre></div><div class="hl"><strong>info() é a função mais informativa para exploração.</strong> Ela mostra o tipo de cada coluna, quantos valores nao-nulos existem e o uso de memória — tudo de uma vez. Sempre chame info() logo após carregar um dataset novo.</div>';},
function(){return '<div class="ey">describe · 3 min</div><div class="stitle">describe() — estatísticas em uma chamada</div><div class="ssub"><code>describe()</code> gera um resumo estatístico de todas as colunas numéricas. É o ponto de partida de qualquer análise exploratória.</div><div class="cw"><div class="ch"><span>Python · describe() na prática</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="p">df</span>.<span class="fn">describe</span>()\n\n<span class="cm"># Saída típica para coluna numérica:</span>\n<span class="cm">#         nota</span>\n<span class="cm"># count    30.0   → quantas linhas</span>\n<span class="cm"># mean      7.2   → média</span>\n<span class="cm"># std       1.4   → desvio padrão</span>\n<span class="cm"># min       3.5   → mínimo</span>\n<span class="cm"># 25%       6.5   → primeiro quartil</span>\n<span class="cm"># 50%       7.5   → mediana</span>\n<span class="cm"># 75%       8.2   → terceiro quartil</span>\n<span class="cm"># max       9.8   → máximo</span>\n\n<span class="cm"># Incluir colunas de texto também</span>\n<span class="p">df</span>.<span class="fn">describe</span>(<span class="p">include</span>=<span class="s">"all"</span>)</pre></div><div class="hl"><strong>Os quartis revelam a distribuição.</strong> Se a diferença entre 75% e max for muito grande, há outliers. Se mean e median (50%) forem muito diferentes, a distribuição é assimétrica — informação valiosa antes de qualquer modelo.</div>';},
function(){return '<div class="ey">Seleção · 4 min</div><div class="stitle">Selecionando colunas e filtrando linhas</div><div class="ssub">Selecionar colunas e filtrar linhas são as operações mais frequentes em análise de dados. Pandas tem sintaxe direta para ambas.</div><div class="cw"><div class="ch"><span>Python · Seleção e filtragem</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Selecionar uma coluna → retorna Series</span>\n<span class="p">df</span>[<span class="s">"nota"</span>]\n\n<span class="cm"># Selecionar múltiplas colunas → DataFrame</span>\n<span class="p">df</span>[[<span class="s">"nome"</span>, <span class="s">"nota"</span>]]\n\n<span class="cm"># Filtrar linhas por condição</span>\n<span class="p">df</span>[<span class="p">df</span>[<span class="s">"nota"</span>] >= <span class="v">5</span>]          <span class="cm"># aprovados</span>\n\n<span class="cm"># Múltiplas condições: & (and) e | (or)</span>\n<span class="p">df</span>[(<span class="p">df</span>[<span class="s">"nota"</span>] >= <span class="v">7</span>) & (<span class="p">df</span>[<span class="s">"turma"</span>] == <span class="s">"A"</span>)]\n\n<span class="cm"># Selecionar por índice: iloc (posição)</span>\n<span class="p">df</span>.<span class="fn">iloc</span>[<span class="v">0</span>]         <span class="cm"># primeira linha</span>\n<span class="p">df</span>.<span class="fn">iloc</span>[<span class="v">0</span>:<span class="v">5</span>]       <span class="cm"># primeiras 5 linhas</span>\n<span class="p">df</span>.<span class="fn">iloc</span>[<span class="v">0</span>, <span class="v">1</span>]      <span class="cm"># linha 0, coluna 1</span>\n\n<span class="cm"># Selecionar por label: loc (nome)</span>\n<span class="p">df</span>.<span class="fn">loc</span>[<span class="v">0</span>, <span class="s">"nota"</span>]  <span class="cm"># linha 0, coluna nota</span></pre></div>';},
function(){return '<div class="ey">groupby · 3 min</div><div class="stitle">groupby — agrupando e agregando dados</div><div class="ssub"><code>groupby()</code> divide o DataFrame em grupos e aplica uma operação em cada um. É o equivalente ao "GROUP BY" do SQL e ao pivot table do Excel.</div><div class="cw"><div class="ch"><span>Python · groupby na prática</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Média de notas por turma</span>\n<span class="p">df</span>.<span class="fn">groupby</span>(<span class="s">"turma"</span>)[<span class="s">"nota"</span>].<span class="fn">mean</span>()\n\n<span class="cm"># Múltiplas agregações de uma vez</span>\n<span class="p">df</span>.<span class="fn">groupby</span>(<span class="s">"turma"</span>)[<span class="s">"nota"</span>].<span class="fn">agg</span>([<span class="s">"mean"</span>, <span class="s">"std"</span>, <span class="s">"count"</span>])\n\n<span class="cm"># Agrupar por múltiplas colunas</span>\n<span class="p">df</span>.<span class="fn">groupby</span>([<span class="s">"turma"</span>, <span class="s">"status"</span>])[<span class="s">"nota"</span>].<span class="fn">mean</span>()\n\n<span class="cm"># Contar ocorrências por grupo</span>\n<span class="p">df</span>[<span class="s">"turma"</span>].<span class="fn">value_counts</span>()\n\n<span class="cm"># Reset índice — transforma em DataFrame plano</span>\n<span class="p">df</span>.<span class="fn">groupby</span>(<span class="s">"turma"</span>)[<span class="s">"nota"</span>].<span class="fn">mean</span>().<span class="fn">reset_index</span>()</pre></div><div class="hl"><strong>value_counts()</strong> é uma das funções mais usadas no dia a dia. Ela conta quantas vezes cada valor aparece em uma coluna — perfeito para entender a distribuição de categorias antes de qualquer análise.</div>';},
function(){return '<div class="ey">Transformações · 3 min</div><div class="stitle">Criando colunas e tratando dados</div><div class="ssub">Raramente os dados chegam prontos. Criar colunas derivadas e tratar valores ausentes são operações fundamentais antes de qualquer análise ou modelo.</div><div class="cw"><div class="ch"><span>Python · Transformações essenciais</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div><pre><span class="cm"># Criar nova coluna</span>\n<span class="p">df</span>[<span class="s">"nota_dobrada"</span>] = <span class="p">df</span>[<span class="s">"nota"</span>] * <span class="v">2</span>\n\n<span class="cm"># Coluna condicional com apply + lambda</span>\n<span class="p">df</span>[<span class="s">"status"</span>] = <span class="p">df</span>[<span class="s">"nota"</span>].<span class="fn">apply</span>(<span class="k">lambda</span> <span class="p">x</span>: <span class="s">"Aprovado"</span> <span class="k">if</span> <span class="p">x</span> >= <span class="v">5</span> <span class="k">else</span> <span class="s">"Reprovado"</span>)\n\n<span class="cm"># Renomear colunas</span>\n<span class="p">df</span> = <span class="p">df</span>.<span class="fn">rename</span>(<span class="p">columns</span>={<span class="s">"nota"</span>: <span class="s">"grade"</span>})\n\n<span class="cm"># Tratar valores ausentes</span>\n<span class="p">df</span>.<span class="fn">fillna</span>(<span class="v">0</span>)             <span class="cm"># substituir NaN por 0</span>\n<span class="p">df</span>.<span class="fn">dropna</span>()             <span class="cm"># remover linhas com NaN</span>\n<span class="p">df</span>[<span class="s">"nota"</span>].<span class="fn">fillna</span>(<span class="p">df</span>[<span class="s">"nota"</span>].<span class="fn">mean</span>())  <span class="cm"># preencher com média</span>\n\n<span class="cm"># Ordenar</span>\n<span class="p">df</span>.<span class="fn">sort_values</span>(<span class="s">"nota"</span>, <span class="p">ascending</span>=<span class="v">False</span>)</pre></div>';},
function(){return '<div class="ey">Quiz · 3 min</div><div class="stitle">Verificação de aprendizagem</div><div class="ssub">Turma responde junto.</div><div class="qb"><div class="qa">1. Qual a diferença entre <code>df["nota"]</code> e <code>df[["nota"]]</code>?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>A</span>Sao idênticos — colchetes duplos sao apenas estilo</div><div class="qop" onclick="ansQ(this,\'c\',\'f0\')"><span>B</span>Um retorna Series, o outro retorna DataFrame</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>C</span>Um retorna a coluna, o outro retorna a linha</div><div class="qop" onclick="ansQ(this,\'w\',\'f0\')"><span>D</span>Colchetes duplos causam erro</div></div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! df["nota"] retorna uma Series — apenas os valores da coluna. df[["nota"]] retorna um DataFrame de uma coluna — mantém a estrutura tabular. Isso importa ao passar dados para modelos de ML.</div></div><div class="qb"><div class="qa">2. O que <code>df.groupby("turma")["nota"].mean()</code> retorna?</div><div class="qo"><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>A</span>A média de todas as notas do DataFrame</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>B</span>Uma lista com todas as notas por turma</div><div class="qop" onclick="ansQ(this,\'c\',\'f1\')"><span>C</span>A média da coluna nota calculada separadamente para cada turma</div><div class="qop" onclick="ansQ(this,\'w\',\'f1\')"><span>D</span>Um erro — groupby nao aceita coluna única</div></div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! groupby divide os dados pelo valor de turma e calcula a média de nota em cada grupo separadamente. O resultado é uma Series indexada pelos valores únicos da coluna turma.</div></div>';},
function(){return '<div class="ey">Encerramento · 1 min</div><div class="stitle">Recapitulando</div><div class="ssub">O que aprendemos e o que faremos agora.</div><div class="rl"><div class="ri"><div class="rn">1</div><div class="rt"><strong>pd.read_csv() carrega dados.</strong> Retorna um DataFrame. Use head(), tail() e shape() para a primeira inspeção.</div></div><div class="ri"><div class="rn">2</div><div class="rt"><strong>info() e describe()</strong> revelam tipos, nulos e estatísticas em uma chamada. Sempre os primeiros passos após carregar um dataset.</div></div><div class="ri"><div class="rn">3</div><div class="rt"><strong>df["col"] seleciona coluna</strong> (Series). df[df["col"] > x] filtra linhas. Parênteses envolvendo cada condição sao obrigatórios com & e |.</div></div><div class="ri"><div class="rn">4</div><div class="rt"><strong>groupby() agrupa e agrega.</strong> A combinação groupby + mean/sum/count é o pão com manteiga da análise de dados.</div></div><div class="ri"><div class="rn">5</div><div class="rt"><strong>apply() com lambda</strong> cria colunas derivadas. fillna() e dropna() tratam valores ausentes — essenciais antes de qualquer modelo.</div></div></div><div class="next-page"><div><div class="next-page-label">Próxima etapa</div><div class="next-page-title">▶ Demo ao Vivo — Pandas: Lendo e Explorando Dados</div></div><a class="next-page-btn" href="a07_demo_ao_vivo.html">Abrir Demo →</a></div>';}

function buildDots(){var b=document.getElementById('dots-bar');b.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');(function(idx){d.onclick=function(){goTo(idx);};})(i);b.appendChild(d);if(i<SLIDES.length-1){var s=document.createElement('div');s.className='dsep';b.appendChild(s);}}}
function buildSlides(){var w=document.getElementById('slide-wrap');w.innerHTML='';for(var i=0;i<SLIDES.length;i++){var d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+i;d.innerHTML=SLIDES[i]();w.appendChild(d);}}
function goTo(i){document.getElementById('sl-'+cur).classList.remove('active');var dots=document.querySelectorAll('.dot');dots[cur].classList.remove('active');if(i>cur)dots[cur].classList.add('done');cur=i;var el=document.getElementById('sl-'+cur);el.innerHTML=SLIDES[cur]();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=(cur===0);var bn=document.getElementById('btn-next');bn.disabled=(cur===SLIDES.length-1);bn.textContent=cur===SLIDES.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SLIDES.length;if(!timerStarted){timerStarted=true;startTimer();}}
function goNav(d){var n=cur+d;if(n>=0&&n<SLIDES.length)goTo(n);}
function startTimer(){var r=30*60;var el=document.getElementById('timer');timerInterval=setInterval(function(){r--;var m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(timerInterval);el.textContent='00:00';}},1000);}
function ansQ(el,t,id){var qb=el.closest('.qb');qb.querySelectorAll('.qop').forEach(function(o){if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});var fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Nao exatamente — relembre selecao de colunas e groupby.';}fb.style.display='block';}
buildDots();buildSlides();document.getElementById('btn-prev').disabled=true;
</script>
